<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A1A">
<title>Estou Bem</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{display:flex;flex-direction:column}
input,button,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}

/* ─── CSS Variables (Soho House–inspired) ─────────────── */
:root{
  --primary:#2D4A3E;--primary-dark:#1E352B;--primary-light:#3B5E4F;
  --primary-gradient:linear-gradient(135deg,#2D4A3E 0%,#3B5E4F 100%);
  --gold:#C9A96E;--gold-light:#F5EFE0;--gold-dark:#A68B4B;
  --accent:#C9A96E;--accent-light:#F5EFE0;
  --success:#2D4A3E;--success-light:#E8F0EC;
  --warning:#C9A96E;--warning-light:#FAF5EB;
  --danger:#8B3A3A;--danger-light:#F5E8E8;
  --bg:#F5F0EB;--card:#FFFFFF;--border:#E5DDD3;
  --text:#1A1A1A;--text2:#5C5549;--text3:#9A9189;
  --disabled:#C4BAB0;
  --shadow-sm:0 1px 3px rgba(26,26,26,.04);
  --shadow-md:0 2px 8px rgba(26,26,26,.06);
  --shadow-lg:0 4px 16px rgba(26,26,26,.08);
  --shadow-xl:0 8px 32px rgba(26,26,26,.1);
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-height:68px;
  --serif:'Playfair Display',Georgia,'Times New Roman',serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

/* ─── App Shell ────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;width:100%;max-width:430px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 24px calc(var(--tab-height) + var(--safe-bottom) + 24px);display:none;flex-direction:column}
.screen.active{display:flex}
.screen-padtop{padding-top:calc(var(--safe-top) + 20px)}

/* ─── Tab Bar ──────────────────────────────────────────── */
.tab-bar{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-height) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(26,26,26,.95);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:1px solid rgba(255,255,255,.08);z-index:100;flex-direction:row}
.tab-bar.visible{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:rgba(255,255,255,.45);font-size:10px;font-weight:500;transition:color .3s;letter-spacing:.06em;text-transform:uppercase}
.tab.active{color:#FFF}
.tab.active svg{filter:none}
.tab.sos-tab{color:#C07A5A}
.tab svg{width:24px;height:24px;fill:currentColor;transition:filter .2s}

/* ─── Common ───────────────────────────────────────────── */
.card{background:var(--card);border-radius:4px;padding:24px;box-shadow:none;border:1px solid var(--border);margin-bottom:16px;transition:transform .2s ease,box-shadow .2s ease}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 32px;border-radius:4px;font-weight:500;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:#FFF;background:var(--primary);box-shadow:none;transition:transform .15s,opacity .15s,background .2s;width:100%}
.btn:active{transform:scale(.98);opacity:.9}
.btn-success{background:var(--primary)}
.btn-danger{background:var(--danger)}
.btn-outline{background:transparent;color:var(--primary);border:1px solid var(--primary);box-shadow:none}
.btn-outline:active{background:rgba(45,74,62,.05)}
.btn-ghost{background:transparent;color:var(--primary);box-shadow:none}
.btn-ghost:active{background:rgba(45,74,62,.05)}
.btn-elder{padding:20px 40px;font-size:16px;letter-spacing:.1em}
.btn-small{padding:10px 18px;font-size:12px;letter-spacing:.06em}
.badge{display:inline-flex;padding:4px 12px;border-radius:2px;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.badge-success{background:var(--success-light);color:var(--primary)}
.badge-warning{background:var(--warning-light);color:var(--gold-dark)}
.badge-danger{background:var(--danger-light);color:var(--danger)}
h1{font-family:var(--serif);font-size:32px;font-weight:400;margin-bottom:4px;letter-spacing:-.01em;color:var(--text)}
h2{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:8px;letter-spacing:0}
.subtitle{color:var(--text2);font-size:15px;margin-bottom:20px;line-height:1.6}
.caption{color:var(--text2);font-size:13px;line-height:1.5}
.text-center{text-align:center}
.mt-sm{margin-top:8px}.mt-md{margin-top:16px}.mt-lg{margin-top:24px}.mt-xl{margin-top:32px}
.mb-md{margin-bottom:16px}
.gap-sm{gap:8px}.gap-md{gap:12px}
.row{display:flex;align-items:center}.col{display:flex;flex-direction:column}
.flex1{flex:1}
.w100{width:100%}
input[type="text"],input[type="tel"],input[type="number"],input[type="time"],input[type="email"],input[type="password"],select{
  width:100%;padding:14px 0;border:none;border-bottom:1px solid var(--border);border-radius:0;font-size:16px;
  background:transparent;color:var(--text);outline:none;transition:border-color .3s}
input:focus,select:focus{border-color:var(--primary);box-shadow:none}
.input-label{font-weight:500;font-size:11px;margin:20px 0 4px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}

/* ─── Onboarding ───────────────────────────────────────── */
.onboarding-slides{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.onboarding-slides::-webkit-scrollbar{display:none}
.onboarding-slide{min-width:100%;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;text-align:center;min-height:60vh}
.onboarding-icon{width:120px;height:120px;border-radius:60px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:40px}
.onboarding-icon svg{width:56px;height:56px;fill:#FFF}
.onboarding-slide h1{font-size:28px;margin-bottom:16px;font-family:var(--serif);font-weight:400}
.onboarding-slide p{font-size:16px;color:var(--text2);line-height:1.7}
.dots{display:flex;gap:8px;justify-content:center;margin:20px 0}
.dot{width:8px;height:8px;border-radius:4px;background:var(--border);transition:all .3s}
.dot.active{background:var(--primary);width:24px}

/* ─── Setup ────────────────────────────────────────────── */
.role-grid{display:flex;gap:12px;margin-bottom:16px}
.role-card{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 8px;border-radius:4px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:500;color:var(--text2);transition:all .3s ease;letter-spacing:.04em;text-transform:uppercase}
.role-card.active{border-color:var(--primary);background:var(--primary);color:#FFF}
.role-card svg{width:28px;height:28px;fill:currentColor}

/* ─── Elder Home ───────────────────────────────────────── */
.greeting{font-family:var(--serif);font-size:34px;font-weight:300;text-align:center;margin-top:8px;letter-spacing:0;color:var(--text);-webkit-text-fill-color:var(--text);background:none;-webkit-background-clip:unset;background-clip:unset}
.date-text{font-size:12px;color:var(--text3);text-align:center;text-transform:uppercase;margin-bottom:12px;font-weight:500;letter-spacing:.12em}
.checkin-container{display:flex;flex-direction:column;align-items:center;margin:36px 0}
.checkin-btn{width:200px;height:200px;border-radius:100px;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#FFF;font-size:14px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;box-shadow:0 8px 40px rgba(45,74,62,.3);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;border:none;animation:pulse 3s ease-in-out infinite}
.checkin-btn.pending{background:var(--gold);box-shadow:0 8px 40px rgba(201,169,110,.3)}
.checkin-btn.confirmed{background:var(--primary-dark);animation:none;transform:scale(.95)}
.checkin-btn svg{width:56px;height:56px;fill:#FFF}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 8px 40px rgba(45,74,62,.3)}50%{transform:scale(1.04);box-shadow:0 12px 48px rgba(45,74,62,.4)}}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.info-card{text-align:center;padding:24px 16px}
.info-card .value{font-family:var(--serif);font-size:32px;font-weight:400;color:var(--primary)}
.info-card .label{font-size:11px;color:var(--text3);margin-top:8px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}

/* ─── SOS ──────────────────────────────────────────────── */
.sos-btn{width:180px;height:180px;border-radius:90px;background:var(--danger);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#FFF;font-size:14px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;box-shadow:0 8px 32px rgba(139,58,58,.35);border:none;transition:transform .1s}
.sos-btn:active{transform:scale(.92)}
.sos-btn.activated{background:#6B2737}
.sos-btn svg{width:52px;height:52px;fill:#FFF}
.progress-bar-track{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:20px}
.progress-bar-fill{height:100%;background:var(--danger);border-radius:2px;width:0%;transition:width .05s linear}
.quick-call{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--card);border-radius:4px;border:1px solid var(--border);font-weight:500;color:var(--danger);font-size:14px;text-decoration:none;transition:background .15s;letter-spacing:.02em}
.quick-call:active{background:var(--bg)}
.quick-call svg{width:20px;height:20px;fill:var(--danger)}

/* ─── Medications ──────────────────────────────────────── */
.med-card{position:relative}
.med-name{font-family:var(--serif);font-size:18px;font-weight:400}
.med-dosage{font-size:14px;color:var(--text2)}
.med-freq{font-size:13px;color:var(--text3);margin-top:2px}
.stock-row{display:flex;align-items:center;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:13px;color:var(--text2)}
.stock-row.low{color:var(--danger);font-weight:600}
.take-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;background:var(--primary);border-radius:4px;color:#FFF;font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:14px;border:none;transition:transform .15s,opacity .15s}
.take-btn:active{opacity:.85;transform:scale(.98)}
.delete-btn{position:absolute;top:20px;right:20px;background:none;border:none;color:var(--danger);padding:4px}
.delete-btn svg{width:18px;height:18px;fill:var(--danger)}

/* ─── Dashboard ────────────────────────────────────────── */
.status-card{border-left:3px solid var(--text3)}
.status-card.ok{border-left-color:var(--success)}
.status-card.warn{border-left-color:var(--gold)}
.status-card.alert{border-left-color:var(--danger)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{text-align:center;padding:24px 16px}
.stat-card .value{font-family:var(--serif);font-size:32px;font-weight:400;color:var(--primary)}
.stat-card .label{font-size:10px;color:var(--text3);margin-top:8px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.checkin-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid var(--border)}

/* ─── Emergency Contacts ───────────────────────────────── */
.contact-card{display:flex;align-items:center;gap:16px}
.priority-badge{width:36px;height:36px;border-radius:18px;background:var(--primary);color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;flex-shrink:0}
.contact-info{flex:1}
.contact-name{font-weight:500;font-size:16px}
.contact-rel{font-size:13px;color:var(--text3)}
.contact-phone{color:var(--primary);font-size:15px}
.contact-actions{display:flex;gap:12px}
.contact-actions button{padding:6px}
.contact-actions svg{width:22px;height:22px}

/* ─── Health Log ───────────────────────────────────────── */
.health-entry{display:flex;align-items:center;gap:10px}
.health-entry .info{flex:1}
.health-entry .value{font-size:17px;font-weight:500;color:var(--primary)}
.metric-chips{display:flex;flex-wrap:wrap;gap:6px}
.metric-chip{padding:8px 16px;border-radius:2px;border:1px solid var(--border);font-size:12px;font-weight:500;background:var(--card);color:var(--text2);transition:all .2s;letter-spacing:.02em}
.metric-chip.active{background:var(--primary);color:#FFF;border-color:var(--primary)}

/* ─── Paywall ──────────────────────────────────────────── */
.plan-card{border:1px solid var(--border);cursor:pointer;transition:border-color .3s,box-shadow .3s}
.plan-card.selected{border-color:var(--primary);box-shadow:0 4px 16px rgba(45,74,62,.1)}
.plan-card.highlighted{position:relative}
.popular-badge{position:absolute;top:-10px;right:12px;background:var(--gold);color:#FFF;padding:4px 16px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.plan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.plan-name{font-family:var(--serif);font-size:22px;font-weight:400}
.plan-price{font-size:15px;font-weight:500;color:var(--gold-dark)}
.plan-desc{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.feature-list{display:flex;flex-direction:column;gap:8px}
.feature-row{display:flex;align-items:center;gap:8px;font-size:13px}
.feature-row.disabled{color:var(--disabled)}
.feature-row svg{width:16px;height:16px;flex-shrink:0}
.feature-row .check{fill:var(--success)}
.feature-row .cross{fill:var(--disabled)}
.legal-text{font-size:11px;color:var(--text3);text-align:center;line-height:1.7;margin-top:24px}

/* ─── Settings ─────────────────────────────────────────── */
.profile-row{display:flex;align-items:center;gap:16px}
.avatar{width:52px;height:52px;border-radius:26px;background:var(--primary);color:#FFF;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:22px;font-weight:400;flex-shrink:0}
.time-row{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--border)}
.time-text{flex:1;font-size:17px;font-weight:500}
.menu-row{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s}
.menu-row:active{opacity:.6}
.menu-row .label{flex:1;font-size:15px;font-weight:400}

/* ─── Modal ────────────────────────────────────────────── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,26,26,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--bg);width:100%;max-width:430px;max-height:90vh;border-radius:12px 12px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 16px);box-shadow:0 -4px 32px rgba(0,0,0,.12);animation:modalSlide .35s cubic-bezier(.32,.72,0,1)}
@keyframes modalSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.modal-header h2{margin:0;font-family:var(--serif);font-weight:400;font-size:20px}
.modal-close{padding:8px;background:var(--border);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.modal-close:active{background:var(--disabled)}
.modal-close svg{width:16px;height:16px;fill:var(--text)}
.modal-body{padding:24px}

/* ─── Freq chips ───────────────────────────────────────── */
.freq-chips{display:flex;flex-wrap:wrap;gap:8px}
.freq-chip{padding:10px 16px;border-radius:2px;border:1px solid var(--border);font-size:13px;font-weight:500;background:var(--card);color:var(--text2);transition:all .2s}
.freq-chip.active{background:var(--primary);color:#FFF;border-color:var(--primary)}

/* ─── Empty state ──────────────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;padding:56px 24px;color:var(--text3)}
.empty-state svg{width:40px;height:40px;fill:var(--text3);margin-bottom:16px;opacity:.5}
.empty-state p{font-size:15px;text-align:center;line-height:1.6}

/* ─── Toast ────────────────────────────────────────────── */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-120px);background:var(--text);color:var(--bg);padding:14px 28px;border-radius:4px;font-size:14px;font-weight:500;z-index:300;transition:transform .35s cubic-bezier(.32,.72,0,1);white-space:nowrap;max-width:90%;letter-spacing:.02em}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ─── Escalation ───────────────────────────────────────── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.escalation-active{animation:blink 1.5s infinite}

/* ─── Gold accent divider ──────────────────────────────── */
.gold-divider{width:40px;height:2px;background:var(--gold);margin:16px auto}

/* ─── Global SVG sizing (Safari fix) ──────────────────── */
/* SVGs now have intrinsic width/height="24" attributes, so CSS sizing works reliably in Safari */
svg{flex-shrink:0}
.menu-row svg{width:18px;height:18px;fill:var(--text3)}
.info-card svg,.stat-card svg{width:20px;height:20px}
.contact-card svg,.contact-actions svg{width:18px;height:18px}
.checkin-row svg{width:16px;height:16px}
.row svg{width:18px;height:18px}
.quick-call svg{width:18px;height:18px}
.feature-row svg{width:14px;height:14px}
.empty-state svg{width:32px;height:32px}
.time-row svg{width:16px;height:16px}
.stock-row svg{width:14px;height:14px}
.delete-btn svg{width:16px;height:16px}
.profile-row svg{width:20px;height:20px}
/* Large interactive buttons */
.checkin-btn svg{width:56px;height:56px}
.sos-btn svg{width:52px;height:52px}
.onboarding-icon svg{width:56px;height:56px}
.tab svg{width:22px;height:22px}
</style>
</head>
<body>
<div id="app">
  <!-- Screens injected by JS -->
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// ESTOU BEM — Mobile Web Prototype
// ═══════════════════════════════════════════════════════════

// ─── SVG Icons ────────────────────────────────────────────
const icons = {
  checkmark: `<svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`,
  hand: `<svg viewBox="0 0 24 24" width="24" height="24"><path d="M18.5 8c-.51 0-.97.18-1.34.47L17 8.41V4.5C17 3.12 15.88 2 14.5 2S12 3.12 12 4.5v5.89l-.73-.36C10.3 9.55 9.2 9.36 8.19 9.64c-1.22.34-2.18 1.32-2.48 2.55-.36 1.47.18 2.93 1.37 3.76L12 19.75V22h8v-2.5l1.75-5.25c.16-.49.25-1 .25-1.52V10.5C22 9.12 20.88 8 19.5 8h-1z"/></svg>`,

  } catch(e) {}
}

// ─── API Client ──────────────────────────────────────────
const API_BASE = '';  // same origin
let authToken = localStorage.getItem('estoubem_token') || null;

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (authToken) opts.headers['Authorization'] = `Bearer ${authToken}`;
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(`${API_BASE}${path}`, opts);
    const data = await res.json();
    if (!res.ok) return { ok: false, error: data.error || 'Request failed', status: res.status };
    return { ok: true, data };
  } catch(err) {
    console.warn('[API] offline or error:', err.message);
    return { ok: false, error: 'Network error', offline: true };
  }
}

function setToken(token) {
  authToken = token;
  if (token) localStorage.setItem('estoubem_token', token);
  else localStorage.removeItem('estoubem_token');
}

// Sync full state from API after login/register
async function syncFromAPI() {
  if (!authToken) return;
  const [me, checkins, contacts, meds, health, settings, gamification] = await Promise.all([
    api('GET', '/api/me'),
    api('GET', '/api/checkins?limit=200'),
    api('GET', '/api/contacts'),
    api('GET', '/api/medications'),
    api('GET', '/api/health?limit=100'),
    api('GET', '/api/settings'),
    api('GET', '/api/gamification'),
  ]);
  if (me.ok) {
    const u = me.data;
    state.user = { name: u.name, phone: u.phone, role: u.role, email: u.email, linkCode: u.link_code };
    state.auth = { email: u.email };
    state.subscription = u.subscription;
    state.trialStart = u.trial_start;
    state.linkedElderEmail = u.linked_elder_id ? String(u.linked_elder_id) : null;
    state._userId = u.id;
    state._linkedElderId = u.linked_elder_id;
  }
  if (checkins.ok) state.checkins = checkins.data.map(c => ({ id: c.id, time: c.time, status: c.status, date: c.date }));
  if (contacts.ok) state.contacts = contacts.data.map(c => ({ id: c.id, name: c.name, phone: c.phone, relationship: c.relationship, priority: c.priority }));
  if (meds.ok) state.medications = meds.data.map(m => ({ id: m.id, name: m.name, dosage: m.dosage, frequency: m.frequency, time: m.time, stock: m.stock, unit: m.unit, lowThreshold: m.low_threshold }));
  if (health.ok) state.healthEntries = health.data.map(h => ({ id: h.id, type: h.type, value: h.value, unit: h.unit, time: h.time, date: h.date, notes: h.notes }));
  if (settings.ok) {
    const s = settings.data;
    state.checkinTimes = s.checkin_times || ['09:00'];
    state.checkinMode = s.checkin_mode || 'scheduled';
    state.checkinIntervalHours = s.checkin_interval_hours || 2;
    state.checkinWindowStart = s.checkin_window_start || '07:00';
    state.checkinWindowEnd = s.checkin_window_end || '22:00';
    state.movementDetection = s.movement_detection || false;
  }
  if (gamification.ok) {
    state.gamification = {
      streak: gamification.data.streak || 0,
      points: gamification.data.points || 0,
      badges: gamification.data.badges || [],
    };
  }
  save();
}

// Check if we have a valid token on load
async function tryAutoLogin() {
  if (!authToken) return false;
  const res = await api('GET', '/api/me');
  if (res.ok) {
    await syncFromAPI();
    state.currentTab = state.user?.role === 'elder' ? 'checkin' : 'dashboard';
    return true;
  }
  // Token expired
  setToken(null);
  return false;
}

// ─── Settings & Subscription sync ─────────────────────────
function syncSettings() {
  if (!authToken) return;
  api('PUT', '/api/settings', {
    checkin_times: state.checkinTimes,
    checkin_mode: state.checkinMode,
    checkin_interval_hours: state.checkinIntervalHours,
    checkin_window_start: state.checkinWindowStart,
    checkin_window_end: state.checkinWindowEnd,
    movement_detection: state.movementDetection,
  });
}

function syncSubscription(plan) {
  if (!authToken) return;
  api('PUT', '/api/subscription', { plan });
}

// ─── Utility ──────────────────────────────────────────────
function $(sel, ctx=document) { return ctx.querySelector(sel); }
function $$(sel, ctx=document) { return [...ctx.querySelectorAll(sel)]; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().slice(0,10); }
function timeNow() { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function toast(msg, duration=2500) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia';
  if (h < 18) return 'Boa tarde';
  return 'Boa noite';
}

function formatDate(d) {
  return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
}

function todayCheckins() {
  return state.checkins.filter(c => c.date === today());
}

function confirmedToday() {
  return todayCheckins().filter(c => c.status === 'confirmed').length;
}

function adherenceRate7d() {
  const now = Date.now();
  const week = state.checkins.filter(c => now - new Date(c.date+'T12:00:00').getTime() < 7*86400000);
  if (!week.length) return 0;
  return Math.round(week.filter(c => c.status==='confirmed').length / week.length * 100);
}

function lowStockMeds() {
  return state.medications.filter(m => m.stock <= m.lowThreshold);
}

function maxCheckins() {
  const sub = getEffectiveSub();
  return sub === 'central' ? 5 : sub === 'familia' ? 3 : 1;
}

function maxContacts() {
  const sub = getEffectiveSub();
  return sub === 'free' ? 1 : Infinity;
}

function getEffectiveSub() {
  if (isInTrial()) return 'central'; // all features during trial
  return state.subscription;
}

function isInTrial() {
  if (!state.trialStart) return false;
  return Date.now() - new Date(state.trialStart).getTime() < 30 * 86400000;
}

function trialDaysLeft() {
  if (!state.trialStart) return 0;
  return Math.max(0, 30 - Math.floor((Date.now() - new Date(state.trialStart).getTime()) / 86400000));
}

function getEffectiveCheckinTimes() {
  if (state.checkinMode === 'interval' && state.checkinIntervalHours) {
    const times = [];
    const [sh] = (state.checkinWindowStart || '07:00').split(':').map(Number);
    const [eh] = (state.checkinWindowEnd || '22:00').split(':').map(Number);
    let cur = sh * 60;
    const end = eh * 60;
    while (cur <= end) {
      times.push(`${String(Math.floor(cur/60)).padStart(2,'0')}:${String(cur%60).padStart(2,'0')}`);
      cur += state.checkinIntervalHours * 60;
    }
    return times;
  }
  return state.checkinTimes;
}

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function getAccounts() {
  try { return JSON.parse(localStorage.getItem('estoubem_accounts') || '{}'); } catch(e) { return {}; }
}

function saveAccounts(accs) {
  localStorage.setItem('estoubem_accounts', JSON.stringify(accs));
}

function saveUserState(email, data) {
  localStorage.setItem('estoubem_user_' + email, JSON.stringify(data));
}

function loadUserState(email) {
  try { return JSON.parse(localStorage.getItem('estoubem_user_' + email) || 'null'); } catch(e) { return null; }
}

// ─── Render Engine ────────────────────────────────────────
function render() {
  const app = $('#app');

  if (!state.user) {
    if (state.screen === 'login') app.innerHTML = renderLogin();
    else if (state.screen === 'register') app.innerHTML = renderRegister();
    else if (state.screen === 'setup') app.innerHTML = renderSetup();
    else app.innerHTML = renderOnboarding();
  } else if (state.user.role === 'elder') {
    app.innerHTML = renderElderApp();
  } else {
    app.innerHTML = renderFamilyApp();
  }

  bindEvents();
  save();
}

function getNextCheckinTime() {
  const times = getEffectiveCheckinTimes();
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  for (const t of times) {
    const [h, m] = t.split(':').map(Number);
    if (h * 60 + m > nowMins) return t;
  }
  return null; // all done for today
}

function renderHealthSection(elderData) {
  const entries = elderData.healthEntries || [];
  if (entries.length === 0) {

  const byType = {};
  for (const e of entries) {
    if (!byType[e.type]) byType[e.type] = e;
  }
  const typeLabels = { heart_rate:'Freq. Cardíaca', steps:'Passos', blood_pressure:'Pressão', blood_oxygen:'Oxigênio', temperature:'Temperatura', weight:'Peso', sleep:'Sono', falls:'Quedas' };
  const typeIcons = { heart_rate:'❤️', steps:'🚶', blood_pressure:'🩸', blood_oxygen:'🫁', temperature:'🌡️', weight:'⚖️', sleep:'😴', falls:'⚠️' };
  const typeColors = { heart_rate:'var(--danger)', steps:'var(--primary)', blood_pressure:'var(--warning)', blood_oxygen:'#2196F3', temperature:'#FF5722', weight:'var(--text)', sleep:'#9C27B0', falls:'var(--danger)' };

  return `
    <div class="card">
      <h2>${icons.heart.replace('width','style="width:22px;height:22px;fill:var(--danger);vertical-align:middle;margin-right:6px" width')} Dados de Saúde</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        ${Object.entries(byType).map(([type, e]) => `
          <div style="background:var(--bg);border-radius:12px;padding:12px;text-align:center">
            <div style="font-size:24px">${typeIcons[type]||'📊'}</div>
            <div style="font-size:22px;font-weight:700;color:${typeColors[type]||'var(--text)'}">${e.value}${e.unit?' '+e.unit:''}</div>
            <div style="font-size:12px;color:var(--text2)">${typeLabels[type]||type}</div>
            <div style="font-size:11px;color:var(--text3)">${e.time||''} ${e.date||''}</div>
          </div>
        `).join('')}
      </div>
      ${entries.length > Object.keys(byType).length ? `
        <details style="margin-top:12px">
          <summary style="font-size:13px;color:var(--primary);cursor:pointer;font-weight:600">Ver histórico (${entries.length} registros)</summary>
          <div style="margin-top:8px;max-height:200px;overflow-y:auto">
            ${entries.slice(0, 20).map(e => `
              <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-top:1px solid var(--border)">
                <span>${typeIcons[e.type]||'📊'} ${typeLabels[e.type]||e.type}</span>
                <span style="font-weight:600">${e.value}${e.unit?' '+e.unit:''}</span>
                <span style="color:var(--text3)">${e.time||''}</span>
              </div>
            `).join('')}
          </div>
        </details>
      ` : ''}
    </div>`;
}

  const pending = tc.filter(c => c.status==='pending');
  const statusClass = missed.length ? 'alert' : pending.length ? 'warn' : conf.length ? 'ok' : '';

        <div class="card stat-card"><div class="value">${elderMeds.length}</div><div class="label">Medicamentos</div></div>
        <div class="card stat-card"><div class="value">${allCheckins.length}</div><div class="label">Check-ins total</div></div>

      </div>

      <div class="card">
        <h2>Check-ins Recentes</h2>
        ${allCheckins.length === 0 ? '<p class="caption text-center" style="padding:16px 0">Nenhum check-in ainda</p>' :
          allCheckins.slice(0,5).map(c => `
            <div class="checkin-row">
              <div>
                <div style="font-weight:600">${c.date} ${c.time}</div>
              </div>
              <span class="badge ${c.status==='confirmed'?'badge-success':c.status==='pending'?'badge-warning':'badge-danger'}">
                ${c.status==='confirmed'?'✅ Confirmado':c.status==='pending'?'⏳ Pendente':'❌ Perdido'}
              </span>
            </div>
          `).join('')}
      </div>

      ${lsm.length ? `
        <div class="card" style="border-left:4px solid var(--danger)">
          <div style="font-weight:600;color:var(--danger);margin-bottom:8px">⚠️ Estoque baixo</div>

            <div style="display:flex;justify-content:space-between;padding:4px 0">

              <span style="color:var(--danger);font-weight:600">${m.stock} ${m.unit}</span>

        <div class="card">
          <h2>💊 Medicamentos</h2>

            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;${elderMeds.indexOf(m)>0?'border-top:1px solid var(--border);':''}">

      </div>
    </div>`;
}

function refreshContactsFromAPI() {
  if (!authToken) return;
  api('GET', '/api/contacts').then(res => {
    if (res.ok) {
      const fresh = res.data.map(c => ({ id: c.id, name: c.name, phone: c.phone, relationship: c.relationship, priority: c.priority }));
      if (JSON.stringify(fresh) !== JSON.stringify(state.contacts)) {
        state.contacts = fresh;
        save();
        render();
      }
    }
  });
}

// ─── Event Binding ────────────────────────────────────────
let sosTimer = null, sosInterval = null, sosProgress = 0;

function bindEvents() {
  // Tab switching
  $$('[data-tab]').forEach(el => el.addEventListener('click', () => {
    state.currentTab = el.dataset.tab;
    render();
  }));

  // Actions
  $$('[data-action]').forEach(el => el.addEventListener('click', (e) => {
    const action = el.dataset.action;
    handleAction(action, el);
  }));

  // Roles
  $$('[data-role]').forEach(el => el.addEventListener('click', () => {
    $$('[data-role]').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    el._selectedRole = el.dataset.role;
  }));

  // Freq chips
  $$('[data-freq]').forEach(el => el.addEventListener('click', () => {
    $$('[data-freq]').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }));

  // Plan selection
  $$('[data-action="select-plan"]').forEach(el => el.addEventListener('click', () => {
    const plan = el.dataset.plan;
    if (plan !== 'free' && plan !== state.subscription) {
      state.subscription = plan;
      syncSubscription(plan);
      toast(`✅ Plano ${plan==='familia'?'Família':'Central'} ativado!`);
      save();
      render();
    }
  }));

  // Close modals by tapping overlay background
  $$('.modal-overlay').forEach(overlay => overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('visible');
  }));

  // Interval window inputs
  const intStart = $('#interval-start');
  const intEnd = $('#interval-end');
  if (intStart) intStart.addEventListener('change', () => { state.checkinWindowStart = intStart.value; save(); syncSettings(); render(); });
  if (intEnd) intEnd.addEventListener('change', () => { state.checkinWindowEnd = intEnd.value; save(); syncSettings(); render(); });

  // SOS hold
  const sosBtn = $('#sos-btn');
  if (sosBtn) {
    sosBtn.addEventListener('touchstart', startSOS, { passive: true });
    sosBtn.addEventListener('mousedown', startSOS);
    sosBtn.addEventListener('touchend', cancelSOS);
    sosBtn.addEventListener('touchcancel', cancelSOS);
    sosBtn.addEventListener('mouseup', cancelSOS);
    sosBtn.addEventListener('mouseleave', cancelSOS);
  }
}

function handleAction(action, el) {
  switch(action) {
    case 'next-slide':
      state.onboardingSlide = Math.min(state.onboardingSlide + 1, slides.length - 1);
      render();
      break;
    case 'skip-onboarding':
      state.screen = 'login';
      render();
      break;
    case 'go-login':
      state.screen = 'login';
      render();
      break;
    case 'go-register':
      state.screen = 'register';
      render();
      break;
    case 'skip-login':
      state.screen = 'setup';
      render();
      break;
    case 'do-register': {
      const name = $('#reg-name')?.value?.trim();
      const email = $('#reg-email')?.value?.trim()?.toLowerCase();
      const phone = $('#reg-phone')?.value?.trim();
      const pw = $('#reg-password')?.value;
      const pw2 = $('#reg-password2')?.value;
      const activeRole = $('[data-role].active');
      const role = activeRole?.dataset?.role;
      if (!name) { toast('❌ Digite seu nome'); return; }
      if (!email || !email.includes('@')) { toast('❌ E-mail inválido'); return; }
      if (!role) { toast('❌ Selecione seu perfil'); return; }
      if (!pw || pw.length < 6) { toast('❌ Senha deve ter no mínimo 6 caracteres'); return; }
      if (pw !== pw2) { toast('❌ Senhas não conferem'); return; }
      const consentTerms = $('#consent-terms')?.checked;
      const consentHealth = $('#consent-health-share')?.checked;
      const consentComms = $('#consent-comms')?.checked;
      if (!consentTerms) { toast('❌ Você deve aceitar os Termos de Uso e Política de Privacidade'); return; }
      if (!consentHealth) { toast('❌ Você deve autorizar o compartilhamento de dados de saúde'); return; }
      api('POST', '/api/register', { email, password: pw, name, phone, role }).then(async res => {
        if (!res.ok) { toast(`❌ ${res.error}`); return; }
        setToken(res.data.token);
        // Record LGPD consents
        await Promise.all([
          api('POST', '/api/consent', { type: 'terms_privacy', granted: true }),
          api('POST', '/api/consent', { type: 'health_data_sharing', granted: true }),
          api('POST', '/api/consent', { type: 'service_communications', granted: consentComms || false }),
        ]);
        await syncFromAPI();
        state.currentTab = role === 'elder' ? 'checkin' : 'dashboard';
        toast('🎁 Conta criada! 30 dias grátis com todos os recursos');
        render();
      });
      break;
    }
    case 'do-login': {
      const email = $('#login-email')?.value?.trim()?.toLowerCase();
      const pw = $('#login-password')?.value;
      if (!email || !pw) { toast('❌ Preencha e-mail e senha'); return; }
      api('POST', '/api/login', { email, password: pw }).then(async res => {
        if (!res.ok) { toast(`❌ ${res.error}`); return; }
        setToken(res.data.token);
        await syncFromAPI();
        state.currentTab = state.user?.role === 'elder' ? 'checkin' : 'dashboard';
        toast(`Bem-vindo de volta, ${state.user?.name}!`);
        render();
      });
      break;
    }
    case 'link-elder': {
      const code = $('#link-code')?.value?.trim();
      if (!code) { toast('❌ Digite o código'); return; }
      api('POST', '/api/link-elder', { code }).then(res => {
        if (!res.ok) { toast(`❌ ${res.error}`); return; }
        state.linkedElderEmail = String(res.data.elderId);
        state._linkedElderId = res.data.elderId;
        toast(`✅ Vinculado a ${res.data.elderName}!`);
        save();
        render();
      });
      break;
    }
    case 'complete-setup': {
      const name = $('#setup-name')?.value?.trim();
      const phone = $('#setup-phone')?.value?.trim();
      const activeRole = $('[data-role].active');
      const role = activeRole?.dataset?.role;
      if (!name) { toast('❌ Digite seu nome'); return; }
      if (!role) { toast('❌ Selecione seu perfil'); return; }
      state.user = { name, phone, role };
      state.currentTab = role === 'elder' ? 'checkin' : 'dashboard';
      // Create initial pending checkin for elder
      if (role === 'elder') {
        state.checkins.push({ id: genId(), time: state.checkinTimes[0], status: 'pending', date: today() });
      }
      render();
      break;
    }
    case 'do-checkin': {
      const pending = todayCheckins().find(c => c.status === 'pending');
      if (pending) {
        pending.status = 'confirmed';
        pending.time = timeNow();
        if (authToken) api('PUT', `/api/checkins/${pending.id}`, { status: 'confirmed', time: timeNow() });
      } else {
        // Also resolve any missed check-in that's currently escalating
        const missed = todayCheckins().find(c => c.status === 'missed' && state.escalation?.checkinId === c.id);
        if (missed) missed.status = 'confirmed';
        const newCheckin = { id: genId(), time: timeNow(), status: 'confirmed', date: today() };
        state.checkins.unshift(newCheckin);
        if (authToken) api('POST', '/api/checkins', { time: newCheckin.time, status: 'confirmed', date: newCheckin.date });
      }
      // Stop escalation if active
      if (state.escalation && !state.escalation.resolved) {
        stopEscalation('✅ Check-in confirmado pelo idoso');
        // Notify contacts that everything is OK
        const elderName = state.user?.name || 'Idoso';
        for (const contact of state.contacts) {
          sendWhatsApp(contact.phone, `✅ *ESTOU BEM — Tudo OK*\n\n${elderName} confirmou o check-in.\nFalso alarme — está tudo bem!\n\n— Estou Bem App`);
        }
      }
      if (navigator.vibrate) navigator.vibrate(200);
      toast('✅ Check-in confirmado!');
      save();
      // Animate button
      const btn = $('.checkin-btn');
      if (btn) {
        btn.classList.add('confirmed');
        btn.querySelector('span').textContent = 'Confirmado! ✅';
        setTimeout(() => render(), 1500);
      }
      break;
    }
    case 'show-add-med':
      $('#modal-add-med')?.classList.add('visible');
      break;
    case 'close-modal':
      $(`#${el.dataset.modal}`)?.classList.remove('visible');
      break;
    case 'save-med': {
      const name = $('#med-name')?.value?.trim();
      if (!name) { toast('❌ Digite o nome'); return; }
      const activeFreq = $('[data-freq].active');
      const med = {
        id: genId(), name,
        dosage: $('#med-dosage')?.value?.trim() || '',
        frequency: activeFreq?.dataset?.freq || '1x ao dia',
        time: $('#med-time')?.value || '08:00',
        stock: parseInt($('#med-stock')?.value) || 30,
        unit: $('#med-unit')?.value?.trim() || 'comprimidos',
        lowThreshold: 5,
      };
      state.medications.push(med);
      if (authToken) api('POST', '/api/medications', { name: med.name, dosage: med.dosage, frequency: med.frequency, time: med.time, stock: med.stock, unit: med.unit, low_threshold: med.lowThreshold }).then(r => { if (r.ok) { med.id = r.data.id; save(); } });
      toast('✅ Medicamento adicionado!');
      render();
      break;
    }
    case 'take-med': {
      const med = state.medications.find(m => m.id === el.dataset.id);
      if (!med) return;
      if (med.stock <= 0) { toast('❌ Estoque vazio!'); return; }
      med.stock--;
      if (authToken) api('PUT', `/api/medications/${med.id}`, { stock: med.stock });
      if (med.stock <= med.lowThreshold) toast(`⚠️ Estoque baixo: ${med.name} — ${med.stock} ${med.unit}`);
      else toast(`✅ ${med.name} registrado!`);
      render();
      break;
    }
    case 'delete-med':
      if (authToken) api('DELETE', `/api/medications/${el.dataset.id}`);
      state.medications = state.medications.filter(m => m.id !== el.dataset.id);
      toast('Medicamento removido');
      render();
      break;
    case 'show-add-contact':
      $('#modal-add-contact')?.classList.add('visible');
      break;
    case 'save-contact': {
      const name = $('#contact-name')?.value?.trim();
      const phone = $('#contact-phone')?.value?.trim();
      if (!name || !phone) { toast('❌ Nome e telefone obrigatórios'); return; }
      if (state.contacts.length >= maxContacts()) {
        toast('❌ Plano gratuito permite apenas 1 contato. Faça upgrade!');
        $('#modal-add-contact')?.classList.remove('visible');
        $('#modal-paywall')?.classList.add('visible');
        return;
      }
      const contact = {
        id: genId(), name, phone,
        relationship: $('#contact-rel')?.value?.trim() || '',
        priority: state.contacts.length + 1,
      };
      state.contacts.push(contact);
      if (authToken) api('POST', '/api/contacts', contact).then(r => { if (r.ok) { contact.id = r.data.id; save(); } });
      toast('✅ Contato adicionado!');
      render();
      break;
    }
    case 'delete-contact':
      if (authToken) api('DELETE', `/api/contacts/${el.dataset.id}`);
      state.contacts = state.contacts.filter(c => c.id !== el.dataset.id);
      toast('Contato removido');
      render();
      break;
    case 'show-paywall':
      $('#modal-paywall')?.classList.add('visible');
      break;
    case 'toggle-movement-detection':
      state.movementDetection = !state.movementDetection;
      save(); syncSettings();
      render();
      break;
    case 'set-checkin-mode':
      state.checkinMode = el.dataset.mode;
      save(); syncSettings();
      render();
      break;
    case 'set-interval':
      state.checkinIntervalHours = parseInt(el.dataset.hours);
      save(); syncSettings();
      render();
      break;
    case 'add-time': {
      const t = $('#new-checkin-time')?.value;
      if (!t) return;
      if (state.checkinTimes.length >= maxCheckins()) {
        toast(`❌ Limite de ${maxCheckins()} check-ins no seu plano`);
        return;
      }
      state.checkinTimes.push(t);
      state.checkinTimes.sort();
      save(); syncSettings();
      toast(`✅ Check-in às ${t} adicionado`);
      render();
      break;
    }
    case 'remove-time':
      state.checkinTimes = state.checkinTimes.filter(t => t !== el.dataset.time);
      save(); syncSettings();
      render();
      break;
    case 'logout':
      if (confirm('Sair da conta?')) {
        setToken(null);
        if (state.auth?.email) saveUserState(state.auth.email, state);
        localStorage.removeItem('estoubem_state');
        state = { screen:'login', onboardingSlide:0, auth:null, user:null, checkins:[], medications:[], contacts:[], healthEntries:[], checkinTimes:['09:00'], checkinMode:'scheduled', checkinIntervalHours:2, checkinWindowStart:'07:00', checkinWindowEnd:'22:00', movementDetection:false, subscription:'free', trialStart:null, linkedElderEmail:null, currentTab:'checkin', escalation:null, gamification:{streak:0,points:0,badges:[]} };
        render();
      }
      break;
    case 'go-back':
      state.currentTab = state.user?.role === 'elder' ? 'checkin' : 'dashboard';
      render();
      break;
    case 'resolve-escalation':
      stopEscalation('✅ Resolvida manualmente — idoso está bem');
      break;
    case 'escalation-sos':
      if (state.escalation) {
        state.escalation.log.push({ time: Date.now(), level: 'emergency_manual', message: '🚨 SAMU acionado manualmente' });
        save();
      }
      window.location.href = 'tel:192';
      break;
    case 'marketplace-filter': {
      const type = el.dataset.type;
      // Highlight selected category
      $$('[data-action="marketplace-filter"]').forEach(b => {
        b.className = b.dataset.type === type ? 'btn btn-small' : 'btn btn-small btn-outline';
        b.style.width = 'auto';
        b.style.fontSize = '13px';
        b.style.padding = '8px 14px';
        b.style.borderRadius = '999px';
      });
      const container = $('#marketplace-providers');
      if (container) container.innerHTML = '<div class="card text-center"><p class="caption">⏳ Carregando prestadores...</p></div>';
      api('GET', `/api/marketplace/providers?type=${type}`).then(res => {
        const container = $('#marketplace-providers');
        if (!container) return;
        if (res.ok && res.data.length > 0) {
          container.innerHTML = res.data.map(p => `
            <div class="card" style="border:1px solid var(--border)">
              <div style="font-weight:700;font-size:16px;margin-bottom:4px">${p.name}</div>
              <div style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.4">${p.description}</div>
              <button class="btn btn-small" style="width:auto" onclick="toast('📞 Agendamento solicitado!')">Agendar</button>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="card text-center"><p class="caption">Nenhum prestador encontrado nesta categoria.</p></div>';
        }
      });
      break;
    }
    case 'calendar-sync':
      toast('🔄 Sincronizando calendário...');
      api('POST', '/api/calendar/sync').then(res => {
        if (res.ok) {
          toast('✅ Calendário sincronizado!');
          // Reload calendar events
          api('GET', '/api/calendar').then(calRes => {
            const container = $('#calendar-upcoming');
            if (!container || !calRes.ok) return;
            const events = calRes.data || [];
            if (events.length > 0) {
              // Group by date
              const grouped = {};
              events.forEach(e => { if (!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
              container.innerHTML = Object.entries(grouped).map(([date, evts]) => `
                <div class="card">
                  <h2 style="font-size:14px;color:var(--primary);text-transform:capitalize">${formatDate(date)}</h2>
                  ${evts.map(e => `
                    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:12px;border:1px solid var(--border);margin-top:6px">
                      <span style="font-size:16px">${e.icon || '📌'}</span>
                      <div style="flex:1">
                        <div style="font-weight:600;font-size:14px">${e.title}</div>
                        <div style="font-size:12px;color:var(--text3)">${e.time || ''}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `).join('');
            } else {
              container.innerHTML = '<div class="card"><h2 style="font-size:16px">Próximos eventos</h2><div class="caption text-center" style="padding:16px 0">Nenhum evento encontrado</div></div>';
            }
          });
        } else {
          toast('❌ Falha ao sincronizar calendário');
        }
      });
      break;
    case 'generate-report': {
      const month = $('#report-month')?.value;
      if (!month) { toast('❌ Selecione um mês'); break; }
      toast('📄 Gerando relatório...');
      api('GET', `/api/health-report/${month}`).then(res => {
        const container = $('#health-report-content');
        if (!container) return;
        if (res.ok && res.data) {
          const r = res.data;
          container.innerHTML = `
            <div class="card">
              <h2 style="font-size:16px">Resumo — ${month}</h2>
              <div class="stats-grid" style="margin-top:12px">
                <div class="stat-card card" style="margin-bottom:0">
                  <div class="value">${r.checkin_rate || 0}%</div>
                  <div class="label">Taxa check-in</div>
                </div>
                <div class="stat-card card" style="margin-bottom:0">

            ${r.metrics && r.metrics.length > 0 ? `
              <div class="card">
                <h2 style="font-size:16px">Métricas de Saúde</h2>
                ${r.metrics.map(m => `
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:10px;margin-top:6px">
                    <span style="font-weight:600;font-size:14px">${m.type}</span>
                    <span style="font-weight:700;color:var(--primary)">${m.average} ${m.unit||''}</span>

            ${r.medications && r.medications.length > 0 ? `
              <div class="card">
                <h2 style="font-size:16px">Medicamentos</h2>
                ${r.medications.map(m => `
                  <div style="padding:8px 12px;background:var(--bg);border-radius:10px;margin-top:6px">
                    <div style="font-weight:600;font-size:14px">${m.name}</div>
                    <div style="font-size:12px;color:var(--text3)">${m.dosage}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            <button class="btn btn-outline mt-sm" data-action="share-report">📤 Compartilhar com médico</button>
          `;
          bindEvents();
          toast('✅ Relatório gerado!');
        } else {
          toast('❌ Falha ao gerar relatório');
        }
      });
      break;
    }
    case 'share-report': {
      const reportText = `Relatório Mensal de Saúde — Estou Bem\nPaciente: ${state.user?.name || 'N/A'}\nTaxa de Check-in: ${adherenceRate7d()}%\nMedicamentos: ${state.medications.map(m => m.name + ' ' + m.dosage).join(', ') || 'Nenhum'}\nGerado em: ${new Date().toLocaleDateString('pt-BR')}`;
      if (navigator.share) {
        navigator.share({ title: 'Relatório de Saúde — Estou Bem', text: reportText }).catch(() => {});
      } else {
        navigator.clipboard.writeText(reportText).then(() => toast('📋 Relatório copiado para área de transferência!')).catch(() => toast('❌ Falha ao copiar'));
      }
      break;
    }
    case 'show-escalation':
      state.currentTab = 'escalation';
      render();
      break;
    case 'test-escalation': {
      // Create a missed check-in and start escalation for demo
      const missedId = genId();
      state.checkins.unshift({ id: missedId, time: timeNow(), status: 'missed', date: today() });
      startEscalation(missedId);
      state.currentTab = 'escalation';
      render();
      break;
    }
    case 'test-whatsapp': {
      // Quick test: send WhatsApp to first contact
      const firstContact = state.contacts[0];
      if (!firstContact) { toast('❌ Adicione um contato primeiro'); break; }
      const elderName = state.user?.name || 'Idoso';
      sendWhatsApp(firstContact.phone, `✅ *ESTOU BEM — Teste*\n\nEste é um teste do sistema de notificação.\n${elderName} está usando o app Estou Bem.\n\n— Estou Bem App`)
        .then(r => toast(r.success ? `✅ WhatsApp enviado para ${firstContact.name}` : `❌ Falha: ${r.error || 'erro'}`));
      break;
    }
  }
}

function startSOS(e) {
  e.preventDefault();
  sosProgress = 0;
  const track = $('#sos-progress-track');
  const fill = $('#sos-progress');
  if (track) track.style.display = 'block';
  if (navigator.vibrate) navigator.vibrate([100,100,100]);
  sosInterval = setInterval(() => {
    sosProgress += 2;
    if (fill) fill.style.width = Math.min(sosProgress, 100) + '%';
    if (sosProgress >= 100) {
      clearInterval(sosInterval);
      sosInterval = null;
      // SOS activated!
      if (navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
      const btn = $('#sos-btn');
      if (btn) {
        btn.classList.add('activated');
        btn.querySelector('span').textContent = 'SOS ATIVADO';
      }
      toast('🚨 SOS ATIVADO! Enviando WhatsApp e ligando...');

      // Send WhatsApp SOS to all contacts
      const elderName = state.user?.name || 'Idoso';
      for (const contact of state.contacts) {
        sendWhatsApp(contact.phone,
          `🚨🚨 *SOS — EMERGÊNCIA*\n\n${elderName} acionou o botão de emergência no app Estou Bem!\n\n⚠️ AÇÃO IMEDIATA NECESSÁRIA\nPor favor ligue ou vá pessoalmente verificar.\nSAMU: 192\n\n— Estou Bem App`
        );
      }

      // Call all contacts
      for (const contact of state.contacts.sort((a,b) => a.priority - b.priority)) {
        initiateCall(contact.phone,
          `URGENTE: Você está recebendo uma ligação de emergência do app Estou Bem. ${elderName} acionou o botão de SOS. Fale em português do Brasil. Informe que ${elderName} precisa de ajuda imediata. Peça para a pessoa ir verificar ou ligar para o SAMU no 192.`
        );
      }

      setTimeout(() => render(), 5000);
    }
  }, 60); // 3 seconds total = 50 steps * 60ms
}

function cancelSOS() {
  if (sosInterval) clearInterval(sosInterval);
  sosInterval = null;
  sosProgress = 0;
  const track = $('#sos-progress-track');
  const fill = $('#sos-progress');
  if (track) track.style.display = 'none';
  if (fill) fill.style.width = '0%';
}

// ═══════════════════════════════════════════════════════════
// WHATSAPP BOT + CALL INTEGRATION (Escalation System)
// ═══════════════════════════════════════════════════════════

const WHATSAPP_BOT_URL = 'https://magnificent-simplicity-production-f3f5.up.railway.app';
const WHATSAPP_BOT_API_KEY = 'b6f97b9e2da0c259a3c1aca967da3cceeeb28a4b28e3aee6';

// Escalation state
if (!state.escalation) state.escalation = null;
// escalation: { checkinId, startedAt, level, log:[], timer:null }

const ESCALATION_LEVELS = [
  { id: 'reminder_sent',      label: '🔔 Lembrete reenviado',         delayMin: 0,  action: 'remind' },
  { id: 'passive_check',      label: '📡 Verificação passiva',         delayMin: 5,  action: 'passive' },
  { id: 'whatsapp_family',    label: '📱 WhatsApp para familiares',    delayMin: 10, action: 'whatsapp_family' },
  { id: 'call_elder',         label: '📞 Ligação para o idoso',        delayMin: 15, action: 'call_elder' },
  { id: 'call_family',        label: '📞 Ligação para familiares',     delayMin: 20, action: 'call_family' },
  { id: 'central_activated',  label: '🏥 Central de atendimento',      delayMin: 30, action: 'central' },
  { id: 'emergency_services', label: '🚨 Serviços de emergência',      delayMin: 45, action: 'emergency' },
];

// ─── WhatsApp API ─────────────────────────────────────────
function normalizePhone(raw) {
  let p = raw.replace(/\D/g, '');
  // Brazilian numbers: if starts with local area code (2 digits) + 9-digit mobile, prepend 55
  if (/^[1-9]{2}9\d{8}$/.test(p)) p = '55' + p;
  // Also handle 8-digit landlines with area code
  if (/^[1-9]{2}[2-5]\d{7}$/.test(p)) p = '55' + p;
  return p;
}

async function sendWhatsApp(phone, message) {
  const cleanPhone = normalizePhone(phone);
  try {
    const res = await fetch(`${WHATSAPP_BOT_URL}/api/send`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${WHATSAPP_BOT_API_KEY}`,
      },
      body: JSON.stringify({ to: cleanPhone, text: message }),
    });
    const data = await res.json();
    console.log('[WhatsApp] Sent to', cleanPhone, data);
    return { success: res.ok, data };
  } catch(err) {
    console.error('[WhatsApp] Error sending:', err);
    return { success: false, error: err.message };
  }
}

async function initiateCall(phone, task) {
  const cleanPhone = normalizePhone(phone);
  try {
    // Use the MCP tool endpoint to initiate a phone call
    const res = await fetch(`${WHATSAPP_BOT_URL}/api/phone-call/initiate`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${WHATSAPP_BOT_API_KEY}`,
      },
      body: JSON.stringify({ to: cleanPhone, task }),
    });
    // If direct endpoint doesn't exist, try MCP
    if (!res.ok) {
      const mcpRes = await fetch(`${WHATSAPP_BOT_URL}/mcp`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${WHATSAPP_BOT_API_KEY}`,
        },
        body: JSON.stringify({
          jsonrpc: '2.0', id: genId(), method: 'tools/call',
          params: { name: 'initiate_phone_call', arguments: { to: cleanPhone, task } }
        }),
      });
      const mcpData = await mcpRes.json();
      console.log('[Call] MCP response:', mcpData);
      return { success: mcpRes.ok, data: mcpData };
    }
    const data = await res.json();
    console.log('[Call] Initiated to', cleanPhone, data);
    return { success: true, data };
  } catch(err) {
    console.error('[Call] Error:', err);
    return { success: false, error: err.message };
  }
}

// ─── Escalation Engine ────────────────────────────────────
function startEscalation(checkinId) {
  if (state.escalation?.checkinId === checkinId) return; // Already escalating

  const elderName = state.user?.name || 'Idoso';
  state.escalation = {
    checkinId,
    startedAt: Date.now(),
    levelIndex: 0,
    log: [{ time: Date.now(), level: 'started', message: 'Escalação iniciada — check-in não respondido' }],
    resolved: false,
  };
  save();
  render();
  processEscalationLevel();
}

function stopEscalation(reason) {
  if (!state.escalation) return;
  state.escalation.resolved = true;
  state.escalation.log.push({ time: Date.now(), level: 'resolved', message: reason || 'Escalação resolvida' });
  if (state.escalation._timer) clearTimeout(state.escalation._timer);
  state.escalation._timer = null;
  save();
  render();
  toast('✅ Escalação encerrada');
}

async function processEscalationLevel() {
  const esc = state.escalation;
  if (!esc || esc.resolved) return;

  const level = ESCALATION_LEVELS[esc.levelIndex];
  if (!level) {
    esc.log.push({ time: Date.now(), level: 'max', message: 'Todos os níveis de escalação atingidos' });
    save();
    render();
    return;
  }

  const elderName = state.user?.name || 'Idoso';
  const elderPhone = state.user?.phone;
  const contacts = state.contacts.sort((a,b) => a.priority - b.priority);

  esc.log.push({ time: Date.now(), level: level.id, message: `${level.label}` });
  save();
  render();

  // Execute action for this level
  switch(level.action) {
    case 'remind':
      toast('🔔 Lembrete de check-in reenviado');
      break;

    case 'passive':
      // In real app, check accelerometer/wearable. In web demo, just log.
      esc.log.push({ time: Date.now(), level: 'passive_result', message: '📡 Sem dados de sensores disponíveis (versão web)' });
      break;

    case 'whatsapp_family':
      for (const contact of contacts) {
        const msg = `⚠️ *ESTOU BEM — Alerta*\n\n${elderName} não fez o check-in.\nHorário esperado: ${timeNow()}\n\nPor favor verifique se está tudo bem.\n\n— Estou Bem App`;
        const result = await sendWhatsApp(contact.phone, msg);
        esc.log.push({
          time: Date.now(), level: 'whatsapp_sent',
          message: `📱 WhatsApp → ${contact.name}: ${result.success ? '✅ Enviado' : '❌ Falhou'}`,
        });
      }
      if (contacts.length === 0) {
        esc.log.push({ time: Date.now(), level: 'whatsapp_skip', message: '⚠️ Nenhum contato cadastrado para notificar' });
      }
      break;

    case 'call_elder':
      if (elderPhone) {
        const task = `Você está ligando para ${elderName}, um idoso que não fez o check-in no app Estou Bem. Fale em português do Brasil. Pergunte se está tudo bem e se precisa de ajuda. Se a pessoa confirmar que está bem, agradeça. Se parecer estar em perigo ou não responder claramente, diga que vai notificar a família.`;
        const result = await initiateCall(elderPhone, task);
        esc.log.push({
          time: Date.now(), level: 'call_elder_result',
          message: `📞 Ligação para ${elderName}: ${result.success ? '✅ Iniciada' : '❌ Falhou — ' + (result.error || 'erro')}`,
        });
      } else {
        esc.log.push({ time: Date.now(), level: 'call_skip', message: '⚠️ Telefone do idoso não cadastrado' });
      }
      break;

    case 'call_family':
      for (const contact of contacts.slice(0, 3)) {
        const task = `Você está ligando para ${contact.name}, familiar de ${elderName}. Fale em português do Brasil. Informe que ${elderName} não fez o check-in no app Estou Bem e que não foi possível contato. Peça para ${contact.name} verificar pessoalmente. Se necessário, ligue para os serviços de emergência.`;
        const result = await initiateCall(contact.phone, task);
        esc.log.push({
          time: Date.now(), level: 'call_family_result',
          message: `📞 Ligação → ${contact.name}: ${result.success ? '✅ Iniciada' : '❌ Falhou'}`,
        });
        // Wait between calls to not overwhelm
        await new Promise(r => setTimeout(r, 2000));
      }
      break;

    case 'central':
      esc.log.push({
        time: Date.now(), level: 'central',
        message: '🏥 Central de atendimento acionada (disponível no plano Central)',
      });
      // In production: HTTP call to central dispatch service
      // Also send WhatsApp summary to all contacts
      for (const contact of contacts) {
        const msg = `🚨 *ESTOU BEM — Escalação Ativa*\n\n${elderName} não responde ao check-in há ${Math.round((Date.now() - esc.startedAt) / 60000)} minutos.\n\nA central de atendimento foi acionada. Ligações foram realizadas sem sucesso.\n\n— Estou Bem App`;
        await sendWhatsApp(contact.phone, msg);
      }
      break;

    case 'emergency':
      esc.log.push({
        time: Date.now(), level: 'emergency',
        message: '🚨 SAMU/Bombeiros devem ser acionados. Localização GPS compartilhada.',
      });
      for (const contact of contacts) {
        const msg = `🚨🚨 *ESTOU BEM — EMERGÊNCIA*\n\n${elderName} não responde há ${Math.round((Date.now() - esc.startedAt) / 60000)} minutos.\n\nTodas as tentativas de contato falharam.\n⚠️ POR FAVOR acione o SAMU (192) ou vá pessoalmente verificar.\n\n— Estou Bem App`;
        await sendWhatsApp(contact.phone, msg);
      }
      break;
  }

  save();
  render();

  // Schedule next level
  const nextIndex = esc.levelIndex + 1;
  if (nextIndex < ESCALATION_LEVELS.length && !esc.resolved) {
    const nextLevel = ESCALATION_LEVELS[nextIndex];
    const currentDelay = level.delayMin;
    const nextDelay = nextLevel.delayMin;
    const waitMs = (nextDelay - currentDelay) * 60000;
    // For demo: use accelerated time (10 seconds per "minute")
    const demoWaitMs = Math.max((nextDelay - currentDelay) * 10000, 5000);

    esc._timer = setTimeout(() => {
      esc.levelIndex = nextIndex;
      processEscalationLevel();
    }, demoWaitMs);
  }
}

// ─── Escalation Status Screen ─────────────────────────────
function renderEscalation() {
  const esc = state.escalation;
  if (!esc) {
    return `
      <div class="screen active screen-padtop">
        <h1>Escalação</h1>
        <div class="empty-state mt-lg">
          ${icons.shield}
          <p>Nenhuma escalação ativa</p>
          <p style="font-size:13px;margin-top:4px;color:var(--text3)">A escalação é acionada automaticamente quando um check-in é perdido</p>
        </div>
        <button class="btn btn-outline mt-lg" data-action="go-back">← Voltar</button>
      </div>`;
  }

  const elapsed = Math.round((Date.now() - esc.startedAt) / 1000);
  const elapsedMin = Math.floor(elapsed / 60);
  const elapsedSec = elapsed % 60;

  return `
    <div class="screen active screen-padtop">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h1 style="margin:0">⚡ Escalação</h1>
        <span class="badge ${esc.resolved ? 'badge-success' : 'badge-danger'}">${esc.resolved ? 'Resolvida' : 'ATIVA'}</span>
      </div>

      <div class="card" style="border-left:4px solid ${esc.resolved ? 'var(--success)' : 'var(--danger)'}">
        <div style="font-size:13px;color:var(--text2)">Tempo decorrido</div>
        <div style="font-size:24px;font-weight:700;color:${esc.resolved ? 'var(--success)' : 'var(--danger)'}">${elapsedMin}m ${elapsedSec}s</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">
          Nível: ${ESCALATION_LEVELS[Math.min(esc.levelIndex, ESCALATION_LEVELS.length - 1)]?.label || 'Máximo'}
        </div>
      </div>

      <!-- Progress through levels -->
      <div class="card">
        <h2>Níveis de Escalação</h2>
        ${ESCALATION_LEVELS.map((lv, i) => {
          const isPast = i < esc.levelIndex;
          const isCurrent = i === esc.levelIndex && !esc.resolved;
          const isFuture = i > esc.levelIndex;
          return `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;${i > 0 ? 'border-top:1px solid var(--border);' : ''}">
              <div style="width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
                background:${isPast ? 'var(--success)' : isCurrent ? 'var(--danger)' : 'var(--border)'};
                color:${isPast || isCurrent ? '#FFF' : 'var(--text3)'}">
                ${isPast ? '✓' : i + 1}
              </div>
              <div style="flex:1">
                <div style="font-size:14px;font-weight:${isCurrent ? '700' : '400'};color:${isFuture ? 'var(--text3)' : 'var(--text)'}">${lv.label}</div>
                <div style="font-size:12px;color:var(--text3)">${lv.delayMin}min após check-in</div>
              </div>
              ${isCurrent ? '<span class="badge badge-danger" style="animation:pulse 1.5s infinite">Agora</span>' : ''}
            </div>`;
        }).join('')}
      </div>

      <!-- Activity log -->
      <div class="card">
        <h2>Log de Atividade</h2>
        ${esc.log.slice().reverse().map(entry => `
          <div style="padding:8px 0;border-top:1px solid var(--border);font-size:13px">
            <div style="color:var(--text3);font-size:11px">${new Date(entry.time).toLocaleTimeString('pt-BR')}</div>
            <div>${entry.message}</div>
          </div>
        `).join('')}
      </div>

      ${!esc.resolved ? `
        <button class="btn btn-success mt-md" data-action="resolve-escalation">✅ Tudo bem — Encerrar escalação</button>
        <button class="btn btn-danger mt-sm" data-action="escalation-sos">🚨 Acionar SAMU agora</button>
      ` : `
        <button class="btn btn-outline mt-md" data-action="go-back">← Voltar</button>
      `}
    </div>`;
}

// ─── Initial render (with auto-login) ─────────────────────
(async () => {
  if (authToken) {
    const ok = await tryAutoLogin();
    if (ok) { save(); render(); return; }
  }
  render();
})();

// ─── Check-in alarm + escalation trigger ──────────────────
setInterval(() => {
  if (!state.user || state.user.role !== 'elder') return;
  const now = timeNow();
  const existing = todayCheckins();

  // Create new pending check-ins at scheduled times
  for (const t of getEffectiveCheckinTimes()) {
    if (now === t && !existing.find(c => c.time === t)) {
      state.checkins.unshift({ id: genId(), time: t, status: 'pending', date: today() });
      if (navigator.vibrate) navigator.vibrate([300,200,300]);
      toast('🔔 Hora do check-in!');
      save();
      render();
    }
  }

  // Check for overdue pending check-ins → start escalation
  const pending = todayCheckins().filter(c => c.status === 'pending');
  for (const p of pending) {
    // If pending for more than 2 minutes (demo) or 5 minutes (prod), start escalation
    const createdAt = state.escalation?.checkinId === p.id ? null : p;
    if (createdAt && !state.escalation?.checkinId) {
      // Mark as missed and start escalation
      p.status = 'missed';
      startEscalation(p.id);
    }
  }
}, 30000);

// Refresh escalation screen every 5 seconds if active
setInterval(() => {
  if (state.escalation && !state.escalation.resolved && state.currentTab === 'escalation') {
    render();
  }
}, 5000);
</script>

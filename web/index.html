<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4A90D9">
<title>Estou Bem</title>
<link rel="manifest" href="manifest.json">
<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F7FA;color:#1A1A2E}
body{display:flex;flex-direction:column}
input,button,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}

/* ─── CSS Variables ────────────────────────────────────── */
:root{
  --primary:#4A90D9;--primary-dark:#2E6DB4;--primary-light:#7CB3E8;
  --success:#4CAF50;--success-light:#C8E6C9;
  --warning:#FF9800;--warning-light:#FFE0B2;
  --danger:#F44336;--danger-light:#FFCDD2;
  --bg:#F5F7FA;--card:#FFF;--border:#E0E6ED;
  --text:#1A1A2E;--text2:#6B7280;--text3:#9CA3AF;
  --disabled:#D1D5DB;
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-height:72px;
}

/* ─── App Shell ────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;width:100%;max-width:430px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--tab-height) + var(--safe-bottom) + 16px);display:none;flex-direction:column}
.screen.active{display:flex}
.screen-padtop{padding-top:calc(var(--safe-top) + 12px)}

/* ─── Tab Bar ──────────────────────────────────────────── */
.tab-bar{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-height) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:#FFF;border-top:1px solid var(--border);z-index:100;flex-direction:row}
.tab-bar.visible{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text3);font-size:11px;font-weight:600;transition:color .2s}
.tab.active{color:var(--primary)}
.tab.sos-tab{color:var(--danger)}
.tab svg{width:26px;height:26px;fill:currentColor}

/* ─── Common ───────────────────────────────────────────── */
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:12px;font-weight:700;font-size:16px;color:#FFF;background:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .15s,opacity .15s;width:100%}
.btn:active{transform:scale(.97);opacity:.9}
.btn-success{background:var(--success)}
.btn-danger{background:var(--danger)}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);box-shadow:none}
.btn-ghost{background:transparent;color:var(--primary);box-shadow:none}
.btn-elder{padding:20px 40px;font-size:22px;border-radius:16px}
.btn-small{padding:10px 18px;font-size:14px}
.badge{display:inline-flex;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-warning{background:var(--warning-light);color:var(--warning)}
.badge-danger{background:var(--danger-light);color:var(--danger)}
h1{font-size:28px;font-weight:700;margin-bottom:4px}
h2{font-size:20px;font-weight:600;margin-bottom:8px}
.subtitle{color:var(--text2);font-size:15px;margin-bottom:16px}
.caption{color:var(--text2);font-size:13px}
.text-center{text-align:center}
.mt-sm{margin-top:8px}.mt-md{margin-top:16px}.mt-lg{margin-top:24px}.mt-xl{margin-top:32px}
.mb-md{margin-bottom:16px}
.gap-sm{gap:8px}.gap-md{gap:12px}
.row{display:flex;align-items:center}.col{display:flex;flex-direction:column}
.flex1{flex:1}
.w100{width:100%}
input[type="text"],input[type="tel"],input[type="number"],input[type="time"],select{
  width:100%;padding:14px;border:1px solid var(--border);border-radius:12px;font-size:17px;
  background:#FFF;color:var(--text);outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--primary)}
.input-label{font-weight:600;font-size:15px;margin:12px 0 6px;color:var(--text)}

/* ─── Onboarding ───────────────────────────────────────── */
.onboarding-slides{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.onboarding-slides::-webkit-scrollbar{display:none}
.onboarding-slide{min-width:100%;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;min-height:60vh}
.onboarding-icon{width:140px;height:140px;border-radius:70px;background:var(--bg);display:flex;align-items:center;justify-content:center;margin-bottom:32px}
.onboarding-icon svg{width:70px;height:70px;fill:var(--primary)}
.onboarding-slide h1{font-size:26px;margin-bottom:12px}
.onboarding-slide p{font-size:18px;color:var(--text2);line-height:1.5}
.dots{display:flex;gap:8px;justify-content:center;margin:16px 0}
.dot{width:10px;height:10px;border-radius:5px;background:var(--border);transition:all .3s}
.dot.active{background:var(--primary);width:24px}

/* ─── Setup ────────────────────────────────────────────── */
.role-grid{display:flex;gap:10px;margin-bottom:16px}
.role-card{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 8px;border-radius:16px;border:2px solid var(--border);background:#FFF;font-size:13px;font-weight:600;color:var(--text2);transition:all .2s}
.role-card.active{border-color:var(--primary);background:var(--primary);color:#FFF}
.role-card svg{width:32px;height:32px;fill:currentColor}

/* ─── Elder Home ───────────────────────────────────────── */
.greeting{font-size:28px;font-weight:700;text-align:center;margin-top:8px}
.date-text{font-size:18px;color:var(--text2);text-align:center;text-transform:capitalize;margin-bottom:8px}
.checkin-container{display:flex;flex-direction:column;align-items:center;margin:24px 0}
.checkin-btn{width:220px;height:220px;border-radius:110px;background:var(--success);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#FFF;font-size:24px;font-weight:700;box-shadow:0 4px 20px rgba(76,175,80,.4);transition:transform .3s,box-shadow .3s;border:none;animation:pulse 2s ease-in-out infinite}
.checkin-btn.pending{background:var(--warning);box-shadow:0 4px 20px rgba(255,152,0,.4)}
.checkin-btn.confirmed{background:#388E3C;animation:none;transform:scale(.95)}
.checkin-btn svg{width:70px;height:70px;fill:#FFF}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.info-card{text-align:center;padding:16px}
.info-card .value{font-size:28px;font-weight:700;color:var(--primary)}
.info-card .label{font-size:13px;color:var(--text2);margin-top:4px}

/* ─── SOS ──────────────────────────────────────────────── */
.sos-btn{width:200px;height:200px;border-radius:100px;background:var(--danger);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#FFF;font-size:22px;font-weight:700;box-shadow:0 4px 20px rgba(244,67,54,.4);border:none;transition:transform .1s}
.sos-btn:active{transform:scale(.92)}
.sos-btn.activated{background:#B71C1C}
.sos-btn svg{width:64px;height:64px;fill:#FFF}
.progress-bar-track{width:220px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:16px}
.progress-bar-fill{height:100%;background:var(--danger);border-radius:4px;width:0%;transition:width .05s linear}
.quick-call{display:flex;align-items:center;gap:10px;padding:14px;background:#FFF;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);font-weight:600;color:var(--danger);font-size:16px;text-decoration:none}
.quick-call svg{width:22px;height:22px;fill:var(--danger)}

/* ─── Medications ──────────────────────────────────────── */
.med-card{position:relative}
.med-name{font-size:17px;font-weight:600}
.med-dosage{font-size:14px;color:var(--text2)}
.med-freq{font-size:13px;color:var(--text3);margin-top:2px}
.stock-row{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:13px;color:var(--text2)}
.stock-row.low{color:var(--danger);font-weight:600}
.take-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:var(--success);border-radius:10px;color:#FFF;font-size:16px;font-weight:700;margin-top:10px;border:none}
.take-btn:active{opacity:.85}
.delete-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--danger);padding:4px}
.delete-btn svg{width:20px;height:20px;fill:var(--danger)}

/* ─── Dashboard ────────────────────────────────────────── */
.status-card{border-left:4px solid var(--text3)}
.status-card.ok{border-left-color:var(--success)}
.status-card.warn{border-left-color:var(--warning)}
.status-card.alert{border-left-color:var(--danger)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{text-align:center;padding:14px}
.stat-card .value{font-size:26px;font-weight:700;color:var(--primary)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.checkin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--border)}

/* ─── Emergency Contacts ───────────────────────────────── */
.contact-card{display:flex;align-items:center;gap:12px}
.priority-badge{width:32px;height:32px;border-radius:16px;background:var(--primary-light);color:#FFF;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.contact-info{flex:1}
.contact-name{font-weight:600;font-size:16px}
.contact-rel{font-size:13px;color:var(--text2)}
.contact-phone{color:var(--primary);font-size:15px}
.contact-actions{display:flex;gap:12px}
.contact-actions button{padding:6px}
.contact-actions svg{width:22px;height:22px}

/* ─── Health Log ───────────────────────────────────────── */
.health-entry{display:flex;align-items:center;gap:10px}
.health-entry .info{flex:1}
.health-entry .value{font-size:17px;font-weight:600;color:var(--primary)}
.metric-chips{display:flex;flex-wrap:wrap;gap:6px}
.metric-chip{padding:6px 12px;border-radius:999px;border:1px solid var(--border);font-size:12px;background:#FFF;color:var(--text2)}
.metric-chip.active{background:var(--primary);color:#FFF;border-color:var(--primary)}

/* ─── Paywall ──────────────────────────────────────────── */
.plan-card{border:2px solid transparent;cursor:pointer;transition:border-color .2s}
.plan-card.selected{border-color:var(--primary)}
.plan-card.highlighted{position:relative}
.popular-badge{position:absolute;top:-10px;right:12px;background:var(--primary);color:#FFF;padding:2px 12px;border-radius:999px;font-size:11px;font-weight:700}
.plan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.plan-name{font-size:20px;font-weight:700}
.plan-price{font-size:16px;font-weight:600;color:var(--primary)}
.plan-desc{font-size:13px;color:var(--text2);margin-bottom:12px}
.feature-list{display:flex;flex-direction:column;gap:6px}
.feature-row{display:flex;align-items:center;gap:6px;font-size:13px}
.feature-row.disabled{color:var(--disabled)}
.feature-row svg{width:16px;height:16px;flex-shrink:0}
.feature-row .check{fill:var(--success)}
.feature-row .cross{fill:var(--disabled)}
.legal-text{font-size:11px;color:var(--text3);text-align:center;line-height:1.6;margin-top:24px}

/* ─── Settings ─────────────────────────────────────────── */
.profile-row{display:flex;align-items:center;gap:14px}
.avatar{width:48px;height:48px;border-radius:24px;background:var(--primary);color:#FFF;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0}
.time-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.time-text{flex:1;font-size:17px;font-weight:600}
.menu-row{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.menu-row .label{flex:1;font-size:16px}

/* ─── Modal ────────────────────────────────────────────── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--bg);width:100%;max-width:430px;max-height:90vh;border-radius:20px 20px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 16px)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.modal-header h2{margin:0}
.modal-close{padding:4px;background:none;border:none;font-size:24px;line-height:1}
.modal-body{padding:16px}

/* ─── Freq chips ───────────────────────────────────────── */
.freq-chips{display:flex;flex-wrap:wrap;gap:6px}
.freq-chip{padding:8px 14px;border-radius:999px;border:1px solid var(--border);font-size:13px;background:#FFF;color:var(--text2)}
.freq-chip.active{background:var(--primary);color:#FFF;border-color:var(--primary)}

/* ─── Empty state ──────────────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;padding:48px 24px;color:var(--text3)}
.empty-state svg{width:48px;height:48px;fill:var(--text3);margin-bottom:12px}
.empty-state p{font-size:15px;text-align:center}

/* ─── Toast ────────────────────────────────────────────── */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-120px);background:#333;color:#FFF;padding:12px 24px;border-radius:12px;font-size:15px;font-weight:600;z-index:300;transition:transform .3s ease;white-space:nowrap;max-width:90%}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ─── Escalation ───────────────────────────────────────── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.escalation-active{animation:blink 1.5s infinite}
</style>
</head>

// ─── State ────────────────────────────────────────────────
let state = {
  screen: 'onboarding', // onboarding | setup | elder | family
  onboardingSlide: 0,
  user: null, // { name, phone, role }
  checkins: [], // { id, time, status, date }
  medications: [], // { id, name, dosage, frequency, time, stock, unit, lowThreshold }
  contacts: [], // { id, name, phone, relationship, priority }
  healthEntries: [], // { id, type, value, unit, time, date, notes }
  checkinTimes: ['09:00'],
  subscription: 'free', // free | familia | central
  currentTab: 'checkin', // elder: checkin|meds|sos|settings  family: dashboard|contacts|meds|settings
};

// Load from localStorage
try {
  const saved = localStorage.getItem('estoubem_state');
  if (saved) state = { ...state, ...JSON.parse(saved) };
} catch(e) {}

function save() {
  try { localStorage.setItem('estoubem_state', JSON.stringify(state)); } catch(e) {}
}

// ─── Utility ──────────────────────────────────────────────
function $(sel, ctx=document) { return ctx.querySelector(sel); }
function $$(sel, ctx=document) { return [...ctx.querySelectorAll(sel)]; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().slice(0,10); }
function timeNow() { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function toast(msg, duration=2500) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia';
  if (h < 18) return 'Boa tarde';
  return 'Boa noite';
}

function formatDate(d) {
  return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
}

function todayCheckins() {
  return state.checkins.filter(c => c.date === today());
}

function confirmedToday() {
  return todayCheckins().filter(c => c.status === 'confirmed').length;
}

function adherenceRate7d() {
  const now = Date.now();
  const week = state.checkins.filter(c => now - new Date(c.date+'T12:00:00').getTime() < 7*86400000);
  if (!week.length) return 0;
  return Math.round(week.filter(c => c.status==='confirmed').length / week.length * 100);
}

function lowStockMeds() {
  return state.medications.filter(m => m.stock <= m.lowThreshold);
}

function maxCheckins() {
  return state.subscription === 'central' ? 5 : state.subscription === 'familia' ? 3 : 1;
}

// ─── Render Engine ────────────────────────────────────────
function render() {
  const app = $('#app');

  if (!state.user) {
    if (state.screen === 'setup') {
      app.innerHTML = renderSetup();
    } else {
      app.innerHTML = renderOnboarding();
    }
  } else if (state.user.role === 'elder') {
    app.innerHTML = renderElderApp();
  } else {
    app.innerHTML = renderFamilyApp();
  }

  bindEvents();
  save();
}

// ─── Event Binding ────────────────────────────────────────
let sosTimer = null, sosInterval = null, sosProgress = 0;

function bindEvents() {
  // Tab switching
  $$('[data-tab]').forEach(el => el.addEventListener('click', () => {
    state.currentTab = el.dataset.tab;
    render();
  }));

  // Actions
  $$('[data-action]').forEach(el => el.addEventListener('click', (e) => {
    const action = el.dataset.action;
    handleAction(action, el);
  }));

  // Roles
  $$('[data-role]').forEach(el => el.addEventListener('click', () => {
    $$('[data-role]').forEach(r => r.classList.remove('active'));
    el.classList.add('active');
    el._selectedRole = el.dataset.role;
  }));

  // Freq chips
  $$('[data-freq]').forEach(el => el.addEventListener('click', () => {
    $$('[data-freq]').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }));

  // Plan selection
  $$('[data-action="select-plan"]').forEach(el => el.addEventListener('click', () => {
    const plan = el.dataset.plan;
    if (plan !== 'free' && plan !== state.subscription) {
      state.subscription = plan;
      toast(`✅ Plano ${plan==='familia'?'Família':'Central'} ativado!`);
      save();
      render();
    }
  }));

  // SOS hold
  const sosBtn = $('#sos-btn');
  if (sosBtn) {
    sosBtn.addEventListener('touchstart', startSOS, { passive: true });
    sosBtn.addEventListener('mousedown', startSOS);
    sosBtn.addEventListener('touchend', cancelSOS);
    sosBtn.addEventListener('touchcancel', cancelSOS);
    sosBtn.addEventListener('mouseup', cancelSOS);
    sosBtn.addEventListener('mouseleave', cancelSOS);
  }
}

function handleAction(action, el) {
  switch(action) {
    case 'next-slide':
      state.onboardingSlide = Math.min(state.onboardingSlide + 1, slides.length - 1);
      render();
      break;
    case 'skip-onboarding':
      state.screen = 'setup';
      render();
      break;
    case 'complete-setup': {
      const name = $('#setup-name')?.value?.trim();
      const phone = $('#setup-phone')?.value?.trim();
      const activeRole = $('[data-role].active');
      const role = activeRole?.dataset?.role;
      if (!name) { toast('❌ Digite seu nome'); return; }
      if (!role) { toast('❌ Selecione seu perfil'); return; }
      state.user = { name, phone, role };
      state.currentTab = role === 'elder' ? 'checkin' : 'dashboard';
      // Create initial pending checkin for elder
      if (role === 'elder') {
        state.checkins.push({ id: genId(), time: state.checkinTimes[0], status: 'pending', date: today() });
      }
      render();
      break;
    }
    case 'do-checkin': {
      const pending = todayCheckins().find(c => c.status === 'pending');
      if (pending) {
        pending.status = 'confirmed';
        pending.time = timeNow();
      } else {
        // Also resolve any missed check-in that's currently escalating
        const missed = todayCheckins().find(c => c.status === 'missed' && state.escalation?.checkinId === c.id);
        if (missed) missed.status = 'confirmed';
        state.checkins.unshift({ id: genId(), time: timeNow(), status: 'confirmed', date: today() });
      }
      // Stop escalation if active
      if (state.escalation && !state.escalation.resolved) {
        stopEscalation('✅ Check-in confirmado pelo idoso');
        // Notify contacts that everything is OK
        const elderName = state.user?.name || 'Idoso';
        for (const contact of state.contacts) {
          sendWhatsApp(contact.phone, `✅ *ESTOU BEM — Tudo OK*\n\n${elderName} confirmou o check-in.\nFalso alarme — está tudo bem!\n\n— Estou Bem App`);
        }
      }
      if (navigator.vibrate) navigator.vibrate(200);
      toast('✅ Check-in confirmado!');
      save();
      // Animate button
      const btn = $('.checkin-btn');
      if (btn) {
        btn.classList.add('confirmed');
        btn.querySelector('span').textContent = 'Confirmado! ✅';
        setTimeout(() => render(), 1500);
      }
      break;
    }
    case 'show-add-med':
      $('#modal-add-med')?.classList.add('visible');
      break;
    case 'close-modal':
      $(`#${el.dataset.modal}`)?.classList.remove('visible');
      break;
    case 'save-med': {
      const name = $('#med-name')?.value?.trim();
      if (!name) { toast('❌ Digite o nome'); return; }
      const activeFreq = $('[data-freq].active');
      state.medications.push({
        id: genId(), name,
        dosage: $('#med-dosage')?.value?.trim() || '',
        frequency: activeFreq?.dataset?.freq || '1x ao dia',
        time: $('#med-time')?.value || '08:00',
        stock: parseInt($('#med-stock')?.value) || 30,
        unit: $('#med-unit')?.value?.trim() || 'comprimidos',
        lowThreshold: 5,
      });
      toast('✅ Medicamento adicionado!');
      render();
      break;
    }
    case 'take-med': {
      const med = state.medications.find(m => m.id === el.dataset.id);
      if (!med) return;
      if (med.stock <= 0) { toast('❌ Estoque vazio!'); return; }
      med.stock--;
      if (med.stock <= med.lowThreshold) toast(`⚠️ Estoque baixo: ${med.name} — ${med.stock} ${med.unit}`);
      else toast(`✅ ${med.name} registrado!`);
      render();
      break;
    }
    case 'delete-med':
      state.medications = state.medications.filter(m => m.id !== el.dataset.id);
      toast('Medicamento removido');
      render();
      break;
    case 'show-add-contact':
      $('#modal-add-contact')?.classList.add('visible');
      break;
    case 'save-contact': {
      const name = $('#contact-name')?.value?.trim();
      const phone = $('#contact-phone')?.value?.trim();
      if (!name || !phone) { toast('❌ Nome e telefone obrigatórios'); return; }
      state.contacts.push({
        id: genId(), name, phone,
        relationship: $('#contact-rel')?.value?.trim() || '',
        priority: state.contacts.length + 1,
      });
      toast('✅ Contato adicionado!');
      render();
      break;
    }
    case 'delete-contact':
      state.contacts = state.contacts.filter(c => c.id !== el.dataset.id);
      toast('Contato removido');
      render();
      break;
    case 'show-paywall':
      $('#modal-paywall')?.classList.add('visible');
      break;
    case 'add-time': {
      const t = $('#new-checkin-time')?.value;
      if (!t) return;
      if (state.checkinTimes.length >= maxCheckins()) {
        toast(`❌ Limite de ${maxCheckins()} check-ins no seu plano`);
        return;
      }
      state.checkinTimes.push(t);
      state.checkinTimes.sort();
      toast(`✅ Check-in às ${t} adicionado`);
      render();
      break;
    }
    case 'remove-time':
      state.checkinTimes = state.checkinTimes.filter(t => t !== el.dataset.time);
      render();
      break;
    case 'logout':
      if (confirm('Sair e apagar dados locais?')) {
        localStorage.removeItem('estoubem_state');
        state = { screen:'onboarding', onboardingSlide:0, user:null, checkins:[], medications:[], contacts:[], healthEntries:[], checkinTimes:['09:00'], subscription:'free', currentTab:'checkin', escalation:null };
        render();
      }
      break;
    case 'go-back':
      state.currentTab = state.user?.role === 'elder' ? 'checkin' : 'dashboard';
      render();
      break;
    case 'resolve-escalation':
      stopEscalation('✅ Resolvida manualmente — idoso está bem');
      break;
    case 'escalation-sos':
      if (state.escalation) {
        state.escalation.log.push({ time: Date.now(), level: 'emergency_manual', message: '🚨 SAMU acionado manualmente' });
        save();
      }
      window.location.href = 'tel:192';
      break;
    case 'show-escalation':
      state.currentTab = 'escalation';
      render();
      break;
    case 'test-escalation': {
      // Create a missed check-in and start escalation for demo
      const missedId = genId();
      state.checkins.unshift({ id: missedId, time: timeNow(), status: 'missed', date: today() });
      startEscalation(missedId);
      state.currentTab = 'escalation';
      render();
      break;
    }
    case 'test-whatsapp': {
      // Quick test: send WhatsApp to first contact
      const firstContact = state.contacts[0];
      if (!firstContact) { toast('❌ Adicione um contato primeiro'); break; }
      const elderName = state.user?.name || 'Idoso';
      sendWhatsApp(firstContact.phone, `✅ *ESTOU BEM — Teste*\n\nEste é um teste do sistema de notificação.\n${elderName} está usando o app Estou Bem.\n\n— Estou Bem App`)
        .then(r => toast(r.success ? `✅ WhatsApp enviado para ${firstContact.name}` : `❌ Falha: ${r.error || 'erro'}`));
      break;
    }
  }
}

function startSOS(e) {
  e.preventDefault();
  sosProgress = 0;
  const track = $('#sos-progress-track');
  const fill = $('#sos-progress');
  if (track) track.style.display = 'block';
  if (navigator.vibrate) navigator.vibrate([100,100,100]);
  sosInterval = setInterval(() => {
    sosProgress += 2;
    if (fill) fill.style.width = Math.min(sosProgress, 100) + '%';
    if (sosProgress >= 100) {
      clearInterval(sosInterval);
      sosInterval = null;
      // SOS activated!
      if (navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
      const btn = $('#sos-btn');
      if (btn) {
        btn.classList.add('activated');
        btn.querySelector('span').textContent = 'SOS ATIVADO';
      }
      toast('🚨 SOS ATIVADO! Enviando WhatsApp e ligando...');

      // Send WhatsApp SOS to all contacts
      const elderName = state.user?.name || 'Idoso';
      for (const contact of state.contacts) {
        sendWhatsApp(contact.phone,
          `🚨🚨 *SOS — EMERGÊNCIA*\n\n${elderName} acionou o botão de emergência no app Estou Bem!\n\n⚠️ AÇÃO IMEDIATA NECESSÁRIA\nPor favor ligue ou vá pessoalmente verificar.\nSAMU: 192\n\n— Estou Bem App`
        );
      }

      // Call first contact
      if (state.contacts.length > 0) {
        const first = state.contacts.sort((a,b) => a.priority - b.priority)[0];
        initiateCall(first.phone,
          `URGENTE: Você está recebendo uma ligação de emergência do app Estou Bem. ${elderName} acionou o botão de SOS. Fale em português do Brasil. Informe que ${elderName} precisa de ajuda imediata. Peça para a pessoa ir verificar ou ligar para o SAMU no 192.`
        );
      }

      setTimeout(() => render(), 5000);
    }
  }, 60); // 3 seconds total = 50 steps * 60ms
}

function cancelSOS() {
  if (sosInterval) clearInterval(sosInterval);
  sosInterval = null;
  sosProgress = 0;
  const track = $('#sos-progress-track');
  const fill = $('#sos-progress');
  if (track) track.style.display = 'none';
  if (fill) fill.style.width = '0%';
}

// ─── WhatsApp API ─────────────────────────────────────────
async function sendWhatsApp(phone, message) {
  // Normalize phone: remove non-digits, ensure it starts right
  const cleanPhone = phone.replace(/\D/g, '');
  try {
    const res = await fetch(`${WHATSAPP_BOT_URL}/api/send`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${WHATSAPP_BOT_API_KEY}`,
      },
      body: JSON.stringify({ to: cleanPhone, text: message }),
    });
    const data = await res.json();
    console.log('[WhatsApp] Sent to', cleanPhone, data);
    return { success: res.ok, data };
  } catch(err) {
    console.error('[WhatsApp] Error sending:', err);
    return { success: false, error: err.message };
  }
}

async function initiateCall(phone, task) {
  const cleanPhone = phone.replace(/\D/g, '');
  try {
    // Use the MCP tool endpoint to initiate a phone call
    const res = await fetch(`${WHATSAPP_BOT_URL}/api/phone-call/initiate`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${WHATSAPP_BOT_API_KEY}`,
      },
      body: JSON.stringify({ to: cleanPhone, task }),
    });
    // If direct endpoint doesn't exist, try MCP
    if (!res.ok) {
      const mcpRes = await fetch(`${WHATSAPP_BOT_URL}/mcp`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${WHATSAPP_BOT_API_KEY}`,
        },
        body: JSON.stringify({
          jsonrpc: '2.0', id: genId(), method: 'tools/call',
          params: { name: 'initiate_phone_call', arguments: { to: cleanPhone, task } }
        }),
      });
      const mcpData = await mcpRes.json();
      console.log('[Call] MCP response:', mcpData);
      return { success: mcpRes.ok, data: mcpData };
    }
    const data = await res.json();
    console.log('[Call] Initiated to', cleanPhone, data);
    return { success: true, data };
  } catch(err) {
    console.error('[Call] Error:', err);
    return { success: false, error: err.message };
  }
}

function startEscalation(checkinId) {
  if (state.escalation?.checkinId === checkinId) return; // Already escalating

  const elderName = state.user?.name || 'Idoso';
  state.escalation = {
    checkinId,
    startedAt: Date.now(),
    levelIndex: 0,
    log: [{ time: Date.now(), level: 'started', message: 'Escalação iniciada — check-in não respondido' }],
    resolved: false,
  };
  save();
  render();
  processEscalationLevel();
}

function stopEscalation(reason) {
  if (!state.escalation) return;
  state.escalation.resolved = true;
  state.escalation.log.push({ time: Date.now(), level: 'resolved', message: reason || 'Escalação resolvida' });
  if (state.escalation._timer) clearTimeout(state.escalation._timer);
  state.escalation._timer = null;
  save();
  render();
  toast('✅ Escalação encerrada');
}

async function processEscalationLevel() {
  const esc = state.escalation;
  if (!esc || esc.resolved) return;

  const level = ESCALATION_LEVELS[esc.levelIndex];
  if (!level) {
    esc.log.push({ time: Date.now(), level: 'max', message: 'Todos os níveis de escalação atingidos' });
    save();
    render();
    return;
  }

  const elderName = state.user?.name || 'Idoso';
  const elderPhone = state.user?.phone;
  const contacts = state.contacts.sort((a,b) => a.priority - b.priority);

  esc.log.push({ time: Date.now(), level: level.id, message: `${level.label}` });
  save();
  render();

  // Execute action for this level
  switch(level.action) {
    case 'remind':
      toast('🔔 Lembrete de check-in reenviado');
      break;

    case 'passive':
      // In real app, check accelerometer/wearable. In web demo, just log.
      esc.log.push({ time: Date.now(), level: 'passive_result', message: '📡 Sem dados de sensores disponíveis (versão web)' });
      break;

    case 'whatsapp_family':
      for (const contact of contacts) {
        const msg = `⚠️ *ESTOU BEM — Alerta*\n\n${elderName} não fez o check-in.\nHorário esperado: ${timeNow()}\n\nPor favor verifique se está tudo bem.\n\n— Estou Bem App`;
        const result = await sendWhatsApp(contact.phone, msg);
        esc.log.push({
          time: Date.now(), level: 'whatsapp_sent',
          message: `📱 WhatsApp → ${contact.name}: ${result.success ? '✅ Enviado' : '❌ Falhou'}`,
        });
      }
      if (contacts.length === 0) {
        esc.log.push({ time: Date.now(), level: 'whatsapp_skip', message: '⚠️ Nenhum contato cadastrado para notificar' });
      }
      break;

    case 'call_elder':
      if (elderPhone) {
        const task = `Você está ligando para ${elderName}, um idoso que não fez o check-in no app Estou Bem. Fale em português do Brasil. Pergunte se está tudo bem e se precisa de ajuda. Se a pessoa confirmar que está bem, agradeça. Se parecer estar em perigo ou não responder claramente, diga que vai notificar a família.`;
        const result = await initiateCall(elderPhone, task);
        esc.log.push({
          time: Date.now(), level: 'call_elder_result',
          message: `📞 Ligação para ${elderName}: ${result.success ? '✅ Iniciada' : '❌ Falhou — ' + (result.error || 'erro')}`,
        });
      } else {
        esc.log.push({ time: Date.now(), level: 'call_skip', message: '⚠️ Telefone do idoso não cadastrado' });
      }
      break;

    case 'call_family':
      for (const contact of contacts.slice(0, 3)) {
        const task = `Você está ligando para ${contact.name}, familiar de ${elderName}. Fale em português do Brasil. Informe que ${elderName} não fez o check-in no app Estou Bem e que não foi possível contato. Peça para ${contact.name} verificar pessoalmente. Se necessário, ligue para os serviços de emergência.`;
        const result = await initiateCall(contact.phone, task);
        esc.log.push({
          time: Date.now(), level: 'call_family_result',
          message: `📞 Ligação → ${contact.name}: ${result.success ? '✅ Iniciada' : '❌ Falhou'}`,
        });
        // Wait between calls to not overwhelm
        await new Promise(r => setTimeout(r, 2000));
      }
      break;

    case 'central':
      esc.log.push({
        time: Date.now(), level: 'central',
        message: '🏥 Central de atendimento acionada (disponível no plano Central)',
      });
      // In production: HTTP call to central dispatch service
      // Also send WhatsApp summary to all contacts
      for (const contact of contacts) {
        const msg = `🚨 *ESTOU BEM — Escalação Ativa*\n\n${elderName} não responde ao check-in há ${Math.round((Date.now() - esc.startedAt) / 60000)} minutos.\n\nA central de atendimento foi acionada. Ligações foram realizadas sem sucesso.\n\n— Estou Bem App`;
        await sendWhatsApp(contact.phone, msg);
      }
      break;

    case 'emergency':
      esc.log.push({
        time: Date.now(), level: 'emergency',
        message: '🚨 SAMU/Bombeiros devem ser acionados. Localização GPS compartilhada.',
      });
      for (const contact of contacts) {
        const msg = `🚨🚨 *ESTOU BEM — EMERGÊNCIA*\n\n${elderName} não responde há ${Math.round((Date.now() - esc.startedAt) / 60000)} minutos.\n\nTodas as tentativas de contato falharam.\n⚠️ POR FAVOR acione o SAMU (192) ou vá pessoalmente verificar.\n\n— Estou Bem App`;
        await sendWhatsApp(contact.phone, msg);
      }
      break;
  }

  save();
  render();

  // Schedule next level
  const nextIndex = esc.levelIndex + 1;
  if (nextIndex < ESCALATION_LEVELS.length && !esc.resolved) {
    const nextLevel = ESCALATION_LEVELS[nextIndex];
    const currentDelay = level.delayMin;
    const nextDelay = nextLevel.delayMin;
    const waitMs = (nextDelay - currentDelay) * 60000;
    // For demo: use accelerated time (10 seconds per "minute")
    const demoWaitMs = Math.max((nextDelay - currentDelay) * 10000, 5000);

    esc._timer = setTimeout(() => {
      esc.levelIndex = nextIndex;
      processEscalationLevel();
    }, demoWaitMs);
  }
}

// ─── Escalation Status Screen ─────────────────────────────
function renderEscalation() {
  const esc = state.escalation;
  if (!esc) {
    return `
      <div class="screen active screen-padtop">
        <h1>Escalação</h1>
        <div class="empty-state mt-lg">
          ${icons.shield}
          <p>Nenhuma escalação ativa</p>
          <p style="font-size:13px;margin-top:4px;color:var(--text3)">A escalação é acionada automaticamente quando um check-in é perdido</p>
        </div>
        <button class="btn btn-outline mt-lg" data-action="go-back">← Voltar</button>
      </div>`;
  }

  const elapsed = Math.round((Date.now() - esc.startedAt) / 1000);
  const elapsedMin = Math.floor(elapsed / 60);
  const elapsedSec = elapsed % 60;

  return `
    <div class="screen active screen-padtop">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h1 style="margin:0">⚡ Escalação</h1>
        <span class="badge ${esc.resolved ? 'badge-success' : 'badge-danger'}">${esc.resolved ? 'Resolvida' : 'ATIVA'}</span>
      </div>

      <div class="card" style="border-left:4px solid ${esc.resolved ? 'var(--success)' : 'var(--danger)'}">
        <div style="font-size:13px;color:var(--text2)">Tempo decorrido</div>
        <div style="font-size:24px;font-weight:700;color:${esc.resolved ? 'var(--success)' : 'var(--danger)'}">${elapsedMin}m ${elapsedSec}s</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">
          Nível: ${ESCALATION_LEVELS[Math.min(esc.levelIndex, ESCALATION_LEVELS.length - 1)]?.label || 'Máximo'}
        </div>
      </div>

      <!-- Progress through levels -->
      <div class="card">
        <h2>Níveis de Escalação</h2>
        ${ESCALATION_LEVELS.map((lv, i) => {
          const isPast = i < esc.levelIndex;
          const isCurrent = i === esc.levelIndex && !esc.resolved;
          const isFuture = i > esc.levelIndex;
          return `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;${i > 0 ? 'border-top:1px solid var(--border);' : ''}">
              <div style="width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
                background:${isPast ? 'var(--success)' : isCurrent ? 'var(--danger)' : 'var(--border)'};
                color:${isPast || isCurrent ? '#FFF' : 'var(--text3)'}">
                ${isPast ? '✓' : i + 1}
              </div>
              <div style="flex:1">
                <div style="font-size:14px;font-weight:${isCurrent ? '700' : '400'};color:${isFuture ? 'var(--text3)' : 'var(--text)'}">${lv.label}</div>
                <div style="font-size:12px;color:var(--text3)">${lv.delayMin}min após check-in</div>
              </div>
              ${isCurrent ? '<span class="badge badge-danger" style="animation:pulse 1.5s infinite">Agora</span>' : ''}
            </div>`;
        }).join('')}
      </div>

      <!-- Activity log -->
      <div class="card">
        <h2>Log de Atividade</h2>
        ${esc.log.slice().reverse().map(entry => `
          <div style="padding:8px 0;border-top:1px solid var(--border);font-size:13px">
            <div style="color:var(--text3);font-size:11px">${new Date(entry.time).toLocaleTimeString('pt-BR')}</div>
            <div>${entry.message}</div>
          </div>
        `).join('')}
      </div>

      ${!esc.resolved ? `
        <button class="btn btn-success mt-md" data-action="resolve-escalation">✅ Tudo bem — Encerrar escalação</button>
        <button class="btn btn-danger mt-sm" data-action="escalation-sos">🚨 Acionar SAMU agora</button>
      ` : `
        <button class="btn btn-outline mt-md" data-action="go-back">← Voltar</button>
      `}
    </div>`;
}

// ─── Initial render ───────────────────────────────────────
render();

// ─── Check-in alarm + escalation trigger ──────────────────
setInterval(() => {
  if (!state.user || state.user.role !== 'elder') return;
  const now = timeNow();
  const existing = todayCheckins();

  // Create new pending check-ins at scheduled times
  for (const t of state.checkinTimes) {
    if (now === t && !existing.find(c => c.time === t)) {
      state.checkins.unshift({ id: genId(), time: t, status: 'pending', date: today() });
      if (navigator.vibrate) navigator.vibrate([300,200,300]);
      toast('🔔 Hora do check-in!');
      save();
      render();
    }
  }

  // Check for overdue pending check-ins → start escalation
  const pending = todayCheckins().filter(c => c.status === 'pending');
  for (const p of pending) {
    // If pending for more than 2 minutes (demo) or 5 minutes (prod), start escalation
    const createdAt = state.escalation?.checkinId === p.id ? null : p;
    if (createdAt && !state.escalation?.checkinId) {
      // Mark as missed and start escalation
      p.status = 'missed';
      startEscalation(p.id);
    }
  }
}, 30000);

// Refresh escalation screen every 5 seconds if active
setInterval(() => {
  if (state.escalation && !state.escalation.resolved && state.currentTab === 'escalation') {
    render();
  }
}, 5000);
</script>

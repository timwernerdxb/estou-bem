<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstouBem - WhatsApp Profile Picture</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #2D4A3E;
    overflow: hidden;
  }

  .canvas {
    position: relative;
    width: 640px;
    height: 640px;
    background: #2D4A3E;
    margin: 0 auto;
  }

  /* Gold circular border - centered in top portion */
  .gold-ring {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    height: 250px;
    border: 1.5px solid #C9A96E;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .icon-container svg {
    width: 110px;
    height: 110px;
  }

  /* Brand name */
  .brand-name {
    position: absolute;
    top: 400px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    color: #F5F0E8;
    font-size: 40px;
    font-weight: 400;
    letter-spacing: 4px;
  }

  /* Subtle gold accent line */
  .gold-line {
    position: absolute;
    top: 458px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 1px;
    background: #C9A96E;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="gold-ring">
    <div class="icon-container">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Shield shape -->
        <path d="M50 8 L88 25 L88 50 C88 72 72 90 50 96 C28 90 12 72 12 50 L12 25 Z"
              fill="none" stroke="#F5F0E8" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Checkmark inside shield -->
        <path d="M32 52 L45 65 L68 38"
              fill="none" stroke="#F5F0E8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  <div class="brand-name">Estou Bem</div>
  <div class="gold-line"></div>
</div>
</body>
</html>

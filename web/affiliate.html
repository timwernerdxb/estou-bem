<style>
:root {
  --primary:#2D4A3E;--primary-dark:#1E352B;--primary-light:#3B5E4F;
  --gold:#C9A96E;--gold-light:#F5EFE0;--gold-dark:#A68B4B;
  --bg:#F5F0EB;--card:#FFFFFF;--border:#E5DDD3;
  --text:#1A1A1A;--text2:#5C5549;--text3:#9A9189;
  --success:#2D4A3E;--success-light:#E8F0EC;
  --warning:#C9A96E;--warning-light:#FAF5EB;
  --danger:#8B3A3A;--danger-light:#F5E8E8;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --radius:4px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);}
button{cursor:pointer;border:none;background:none;font-family:inherit;}

/* Layout */
.app{max-width:1100px;margin:0 auto;padding:24px 20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.logo{font-family:var(--serif);font-size:24px;color:var(--primary);font-weight:400;}
.logo span{color:var(--gold);}
.header-right{display:flex;align-items:center;gap:16px;}
.code-badge{background:var(--primary);color:var(--gold);padding:6px 16px;border-radius:var(--radius);font-size:13px;letter-spacing:2px;font-weight:600;}
.logout-btn{font-size:13px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.logout-btn:hover{color:var(--danger);}

/* Login */
.login-container{max-width:400px;margin:80px auto;text-align:center;}
.login-container h1{font-family:var(--serif);font-size:28px;font-weight:400;margin-bottom:8px;}
.login-container p{color:var(--text3);margin-bottom:32px;font-size:14px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;}
.form-group{margin-bottom:20px;text-align:left;}
.form-group label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.form-group input{width:100%;padding:12px 0;border:none;border-bottom:1px solid var(--border);font-size:16px;background:transparent;color:var(--text);outline:none;transition:border-color .2s;}
.form-group input:focus{border-bottom-color:var(--gold);}
.btn{display:block;width:100%;padding:14px;background:var(--primary);color:#F5F0EB;border-radius:var(--radius);font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:500;transition:background .2s;}
.btn:hover{background:var(--primary-dark);}
.btn-gold{background:var(--gold);color:var(--text);}
.btn-gold:hover{background:var(--gold-dark);color:#fff;}
.error-msg{color:var(--danger);font-size:13px;margin-top:12px;}
.gold-divider{width:40px;height:2px;background:var(--gold);margin:20px auto;}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.stat-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.stat-value{font-family:var(--serif);font-size:32px;color:var(--primary);font-weight:400;}
.stat-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.stat-card.gold .stat-value{color:var(--gold-dark);}

/* Section */
.section{margin-bottom:32px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.section-title{font-family:var(--serif);font-size:20px;font-weight:400;}
.section-sub{font-size:12px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}

/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:12px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg);}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(45,74,62,.02);}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:2px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.badge-success{background:var(--success-light);color:var(--success);}
.badge-pending{background:var(--warning-light);color:var(--gold-dark);}
.badge-paid{background:var(--gold-light);color:var(--gold-dark);}

/* Share Link */
.share-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:32px;}
.share-box h3{font-family:var(--serif);font-size:16px;font-weight:400;margin-bottom:12px;}
.link-row{display:flex;gap:8px;}
.link-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);font-family:monospace;}
.copy-btn{padding:10px 20px;background:var(--gold);color:var(--text);border-radius:var(--radius);font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:600;white-space:nowrap;}
.copy-btn:hover{background:var(--gold-dark);color:#fff;}
.copied{background:var(--success)!important;color:#fff!important;}

/* Chart placeholder */
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:32px;min-height:200px;}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:160px;padding-top:20px;}
.chart-bar{flex:1;background:var(--primary);border-radius:2px 2px 0 0;position:relative;min-height:4px;transition:height .5s ease;}
.chart-bar:hover{background:var(--gold);}
.chart-bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text3);white-space:nowrap;}
.chart-bar-value{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text2);font-weight:500;}

/* Period selector */
.period-tabs{display:flex;gap:4px;}
.period-tab{padding:6px 14px;border-radius:var(--radius);font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);}
.period-tab.active{background:var(--primary);color:#fff;}
.period-tab:hover:not(.active){background:var(--border);}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty p{font-size:14px;}

/* Tabs */
.tab-row{display:flex;gap:0;margin-bottom:24px;}
.tab-btn{flex:1;padding:12px 0;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:600;color:var(--text3);border-bottom:2px solid var(--border);transition:all .2s;}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--gold);}
.tab-btn:hover:not(.active){color:var(--text2);border-bottom-color:var(--text3);}

/* Select */
.form-group select{width:100%;padding:12px 0;border:none;border-bottom:1px solid var(--border);font-size:16px;background:transparent;color:var(--text);outline:none;font-family:var(--sans);transition:border-color .2s;-webkit-appearance:none;appearance:none;}
.form-group select:focus{border-bottom-color:var(--gold);}
.optional-label{font-size:10px;color:var(--text3);font-style:italic;margin-left:4px;letter-spacing:0;text-transform:none;}

/* Success message */
.success-msg{background:var(--success-light);color:var(--success);padding:16px;border-radius:var(--radius);font-size:14px;line-height:1.5;margin-top:16px;text-align:center;}

/* Payout Section */
.payout-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:32px;}
.payout-box h3{font-family:var(--serif);font-size:16px;font-weight:400;margin-bottom:12px;}
.payout-balance{font-family:var(--serif);font-size:28px;color:var(--primary);margin-bottom:4px;}
.payout-min{font-size:12px;color:var(--text3);margin-bottom:16px;}
.payout-btn{display:inline-block;padding:12px 24px;background:var(--primary);color:#F5F0EB;border-radius:var(--radius);font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:500;transition:background .2s;}
.payout-btn:hover{background:var(--primary-dark);}
.payout-btn:disabled{opacity:0.4;cursor:not-allowed;}
.payout-btn:disabled:hover{background:var(--primary);}
.payout-status{display:inline-block;padding:3px 10px;border-radius:2px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.payout-status.pending{background:var(--warning-light);color:var(--gold-dark);}
.payout-status.processing{background:#E8F0FE;color:#3B82F6;}
.payout-status.completed{background:var(--success-light);color:var(--success);}
.payout-status.rejected{background:var(--danger-light);color:var(--danger);}
.payout-alert{background:var(--warning-light);border:1px solid var(--gold);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--gold-dark);margin-bottom:12px;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:14px;z-index:1000;transform:translateY(100px);opacity:0;transition:all .3s ease;}
.toast.show{transform:translateY(0);opacity:1;}
</style>

    lang_label: 'Sprache',
  },
};

let currentLang = localStorage.getItem('estoubem_lang') || 'pt-BR';
function t(key) {
  return translations[currentLang]?.[key] || translations['pt-BR'][key] || key;
}
function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('estoubem_lang', lang);
  if (affiliateData) renderDashboard(); else renderLogin();
}

function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function formatCurrency(val) {
  return 'R$ ' + (val || 0).toFixed(2).replace('.', ',');
}

function formatDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

async function doLogin() {
  const email = document.getElementById('af-email').value.trim();
  const password = document.getElementById('af-password').value;
  if (!email || !password) { renderLogin(t('af_fill_fields')); return; }

  try {
    const res = await fetch(`${API}/api/affiliates/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      renderLogin(err.error || t('af_invalid_login'));
      return;
    }
    const data = await res.json();
    affiliateToken = data.token;
    localStorage.setItem('af_token', data.token);
    await loadDashboard();
  } catch (err) {
    renderLogin(t('af_error'));
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const phone = document.getElementById('reg-phone').value.trim();
  const channel = document.getElementById('reg-channel').value;
  const company = document.getElementById('reg-company').value.trim();
  const website = document.getElementById('reg-website').value.trim();
  const social_media = document.getElementById('reg-social').value.trim();

  if (!name || !email || !password) { renderLogin(t('af_fill_name'), 'register'); return; }
  if (password.length < 6) { renderLogin(t('af_min_password'), 'register'); return; }

  try {
    const res = await fetch(`${API}/api/affiliates/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, phone, channel, company: company || undefined, website: website || undefined, social_media: social_media || undefined }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      renderLogin(err.error || t('af_register_error'), 'register');
      return;
    }
    // Show success message
    document.getElementById('register-success').innerHTML = `
      <div class="success-msg">${t('af_register_success')}</div>
    `;
    // Disable submit button
    const btn = document.querySelector('.btn-gold');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; btn.textContent = t('af_register_sent'); }
  } catch (err) {
    renderLogin(t('af_error'), 'register');
  }
}

async function loadDashboard() {
  try {
    const res = await fetch(`${API}/api/affiliates/me/dashboard`, {
      headers: { 'Authorization': `Bearer ${affiliateToken}` },
    });
    if (!res.ok) { doLogout(); return; }
    affiliateData = await res.json();
    renderDashboard();
  } catch (err) {
    doLogout();
  }
}

function renderCommissionRates(ratesOrChannel) {
  const defaultRates = {
    influencer: { trial_started: 5, subscription_familia: 15, subscription_central: 25, recurring_monthly: '10%' },
    paid_media: { trial_started: 3, subscription_familia: 10, subscription_central: 18, recurring_monthly: '5%' },
    ad_network: { registration: 2, trial_started: 4, subscription_familia: 12, subscription_central: 20, recurring_monthly: '8%' },
    referral: { subscription_familia: 10, subscription_central: 15, recurring_monthly: '5%' },
    b2b_partner: { subscription_familia: 20, subscription_central: 35, recurring_monthly: '15%' },
  };

  let rates = typeof ratesOrChannel === 'object' ? ratesOrChannel : (defaultRates[ratesOrChannel] || defaultRates.influencer);

  const labels = {
    registration: t('af_evt_registration'),
    trial_started: t('af_evt_trial'),
    subscription_familia: t('af_evt_sub_familia'),
    subscription_central: t('af_evt_sub_central'),
    recurring_monthly: t('af_evt_recurring'),
  };

  return Object.entries(rates).map(([k, v]) => {
    const label = labels[k] || k;
    const value = typeof v === 'string' ? v : (v >= 1 ? formatCurrency(v) : `${(v * 100).toFixed(0)}%`);
    return `<tr><td>${label}</td><td><strong>${value}</strong></td></tr>`;
  }).join('');
}

function renderModelBadge(model) {
  const labels = {
    percentage: 'Percentual',
    fixed_fee: 'Taxa Fixa',
    hybrid: 'Híbrido',
    ramp_up: 'Escalonado',
  };
  return labels[model] || labels.percentage;
}

function renderCommissionModelInfo(af) {
  const model = af.commission_model || 'percentage';

  if (model === 'fixed_fee') {
    return `
      <div class="share-box" style="margin-bottom:0">
        <h3 style="font-family:var(--serif);font-size:16px;font-weight:400;margin-bottom:8px">Taxa Fixa por Conversão</h3>
        <p style="font-size:14px;color:var(--text)">Cada conversão gera uma comissão fixa de <strong>${formatCurrency(af.fixed_fee || 0)}</strong>.</p>
      </div>
    `;
  }

  if (model === 'hybrid') {
    return `
      <div class="share-box" style="margin-bottom:12px">
        <h3 style="font-family:var(--serif);font-size:16px;font-weight:400;margin-bottom:8px">Modelo Híbrido</h3>
        <p style="font-size:14px;color:var(--text)">Taxa fixa de <strong>${formatCurrency(af.fixed_fee || 0)}</strong> por conversão + taxas por evento abaixo.</p>
      </div>
    `;
  }

  if (model === 'ramp_up') {
    const tiers = af.ramp_up_tiers || [];
    const periodSales = af.period_sales || 0;
    // Find current tier
    let currentTierIdx = 0;
    for (let i = 0; i < tiers.length; i++) {
      if (periodSales >= tiers[i].min_sales && (!tiers[i].max_sales || periodSales <= tiers[i].max_sales)) {
        currentTierIdx = i;
      }
    }

    return `
      <div class="share-box" style="margin-bottom:0">
        <h3 style="font-family:var(--serif);font-size:16px;font-weight:400;margin-bottom:8px">Comissão Escalonada (Ramp-Up)</h3>
        <p style="font-size:13px;color:var(--text3);margin-bottom:12px">Suas taxas aumentam conforme você atinge mais vendas no período.</p>
        <div style="margin-bottom:12px;padding:10px 14px;background:var(--success-light);border-radius:var(--radius);font-size:14px">
          Vendas no periodo atual: <strong>${periodSales}</strong>
          ${tiers[currentTierIdx] ? ` &bull; Taxa atual: <strong>${((tiers[currentTierIdx].rate || 0) * 100).toFixed(1)}%</strong>` : ''}
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Faixa de Vendas</th><th>Taxa</th><th>Status</th></tr></thead>
            <tbody>
              ${tiers.map((tier, i) => {
                const isActive = periodSales >= tier.min_sales && (!tier.max_sales || periodSales <= tier.max_sales);
                const maxLabel = tier.max_sales ? tier.max_sales : '+';
                return `<tr style="${isActive ? 'background:var(--success-light)' : ''}">
                  <td>${tier.min_sales} - ${maxLabel}</td>
                  <td><strong>${((tier.rate || 0) * 100).toFixed(1)}%</strong></td>
                  <td>${isActive ? '<span class="badge badge-success">ATUAL</span>' : '<span class="badge badge-pending">-</span>'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  // Default percentage: no extra info needed
  return '';
}

function translateEvent(event) {
  const map = {
    registration: t('af_evt_registration'),
    trial_started: t('af_evt_trial_short'),
    subscription_started: t('af_evt_subscription'),
    subscription_familia: 'Família',
    subscription_central: 'Central',
    subscription_renewed: t('af_evt_renewal'),
    subscription_cancelled: t('af_evt_cancelled'),
  };
  return map[event] || event;
}

function getMonthlyData(commissions) {
  const months = {};
  commissions.forEach(c => {
    const d = new Date(c.created_at);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const label = d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
    if (!months[key]) months[key] = { label, total: 0 };
    months[key].total += parseFloat(c.amount || 0);
  });
  return Object.entries(months).sort(([a], [b]) => a.localeCompare(b)).map(([, v]) => v).slice(-6);
}

function copyLink() {
  const input = document.getElementById('share-link');
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = t('af_copied');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t('af_copy'); btn.classList.remove('copied'); }, 2000);
  });
}

async function savePixKey() {
  const pixKey = document.getElementById('pix-key').value.trim();
  if (!pixKey) { showToast(t('af_pix_enter')); return; }

  try {
    const res = await fetch(`${API}/api/affiliates/me`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${affiliateToken}` },
      body: JSON.stringify({ pix_key: pixKey }),
    });
    if (res.ok) {
      affiliateData.affiliate.pix_key = pixKey;
      const btn = document.getElementById('pix-btn');
      btn.textContent = t('af_pix_saved');
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = t('af_pix_save'); btn.classList.remove('copied'); }, 2000);
      showToast(t('af_pix_success'));
    } else {
      showToast(t('af_pix_error'));
    }
  } catch (err) {
    showToast(t('af_conn_error'));
  }
}

// ── Payout ────────────────────────────────────────────
let payoutData = [];
let payoutAvailable = 0;

async function loadPayoutSection() {
  const el = document.getElementById('payoutContent');
  if (!el) return;

  const af = affiliateData.affiliate;
  const commissions = affiliateData.commissions || [];

  // Calculate available balance from pending/approved commissions
  payoutAvailable = commissions.filter(c => c.status === 'pending' || c.status === 'approved')
    .reduce((s, c) => s + parseFloat(c.amount || 0), 0);

  const hasPix = !!af.pix_key;
  const MIN_PAYOUT = 100;

  // Load payout history
  try {
    const res = await fetch(`${API}/api/affiliates/me/payouts`, {
      headers: { 'Authorization': `Bearer ${affiliateToken}` },
    });
    if (res.ok) payoutData = await res.json();
  } catch (e) { payoutData = []; }

  const hasPendingRequest = payoutData.some(p => p.status === 'pending' || p.status === 'processing');
  const canRequest = payoutAvailable >= MIN_PAYOUT && hasPix && !hasPendingRequest;

  let html = `
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Saldo disponível para saque (comissões pendentes e aprovadas):</p>
    <div class="payout-balance">${formatCurrency(payoutAvailable)}</div>
    <div class="payout-min">Mínimo para saque: R$ ${MIN_PAYOUT},00</div>
  `;

  if (!hasPix) {
    html += `<div class="payout-alert">Configure sua chave PIX acima antes de solicitar um pagamento.</div>`;
  }
  if (hasPendingRequest) {
    const pending = payoutData.find(p => p.status === 'pending' || p.status === 'processing');
    html += `<div class="payout-alert">Você já possui uma solicitação ${pending.status === 'processing' ? 'em processamento' : 'pendente'} de ${formatCurrency(pending.amount)}.</div>`;
  }

  html += `<button class="payout-btn" ${canRequest ? '' : 'disabled'} onclick="requestPayout()">Solicitar Pagamento</button>`;

  // Payout history
  if (payoutData.length > 0) {
    html += `
      <div style="margin-top:24px">
        <h3 style="font-family:var(--serif);font-size:16px;font-weight:400;margin-bottom:12px">Histórico de Pagamentos</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Data</th><th>Valor</th><th>Chave PIX</th><th>Status</th></tr></thead>
            <tbody>
              ${payoutData.map(p => `
                <tr>
                  <td>${formatDate(p.requested_at)}</td>
                  <td><strong>${formatCurrency(p.amount)}</strong></td>
                  <td style="font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${p.pix_key || '-'}</td>
                  <td><span class="payout-status ${p.status}">${payoutStatusLabel(p.status)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  el.innerHTML = html;
}

function payoutStatusLabel(s) {
  return { pending: 'Pendente', processing: 'Processando', completed: 'Pago', rejected: 'Rejeitado' }[s] || s;
}

async function requestPayout() {
  try {
    const res = await fetch(`${API}/api/affiliates/me/payout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${affiliateToken}` },
    });
    if (res.ok) {
      showToast('Solicitação de pagamento enviada com sucesso!');
      await loadDashboard();
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.error || 'Erro ao solicitar pagamento.');
    }
  } catch (e) {
    showToast('Erro de conexão. Tente novamente.');
  }
}

function setPeriod(p) {
  currentPeriod = p;
  renderDashboard();
}

function doLogout() {
  localStorage.removeItem('af_token');
  affiliateData = null;
  affiliateToken = null;
  renderLogin();
}

// ── Init ──────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('af_token');
  if (saved) {
    affiliateToken = saved;
    document.getElementById('app').innerHTML = `<div style="text-align:center;padding:80px;color:var(--text3);">${t('af_loading')}</div>`;
    loadDashboard();
  } else {
    renderLogin();
  }
})();
</script>
</body>
</html>

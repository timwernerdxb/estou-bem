name: Build Wear OS AAB

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-watch/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > android-watch/local.properties

    - name: Decode keystore
      run: echo "${{ secrets.WEAR_KEYSTORE_BASE64 }}" | base64 --decode > android-watch/release.keystore

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Release AAB
      working-directory: android-watch
      env:
        KEYSTORE_PATH: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.WEAR_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.WEAR_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.WEAR_KEY_PASSWORD }}
      run: gradle bundleRelease --no-daemon

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: wear-os-aab
        path: android-watch/build/outputs/bundle/release/*.aab
        if-no-files-found: error

    - name: Also build Debug APK (for testing)
      working-directory: android-watch
      run: gradle assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: wear-os-debug-apk
        path: android-watch/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
